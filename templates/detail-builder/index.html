<!-- @template name="LWC Detail Screen Builder" description="Drag-and-drop Salesforce record detail-screen designer — full form/display/action/data component set with editable variants, Section/Card/Modal containers (composable bodies), live modal preview; exports a Lightning (LWC) bundle & JSON." -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LWC Detail Screen Builder — SLDS 2</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--slds-g-color-surface-2); color: var(--slds-g-color-on-surface-1); }
  #app, .dsb { height: 100vh; display: flex; flex-direction: column; }

  .dsb-bar { display: flex; align-items: center; gap: 1rem; flex: none; height: 3.25rem; padding: 0 1rem; background: var(--slds-g-color-surface-container-1); border-bottom: 1px solid var(--slds-g-color-border-1); box-shadow: var(--slds-g-shadow-1); z-index: 5; }
  .dsb-brand { display: flex; align-items: center; gap: 0.625rem; min-width: 0; }
  .dsb-brand strong { font-size: var(--slds-g-text-heading-small); display: block; line-height: 1.1; white-space: nowrap; }
  .dsb-sub { font-size: 11px; color: var(--slds-g-color-on-surface-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }
  .dsb-tag { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--slds-g-color-accent-1); background: var(--slds-g-color-accent-container-1); padding: 2px 6px; border-radius: var(--slds-g-radius-border-pill); }

  .dsb-body { flex: 1; display: flex; min-height: 0; }
  .dsb-palette, .dsb-inspect { flex: none; width: 256px; overflow-y: auto; background: var(--slds-g-color-surface-container-1); border-right: 1px solid var(--slds-g-color-border-1); }
  .dsb-inspect { border-right: 0; border-left: 1px solid var(--slds-g-color-border-1); width: 286px; display: flex; flex-direction: column; }
  .dsb-palette-h { font-size: var(--slds-g-text-body-small); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--slds-g-color-on-surface-3); padding: 0.875rem 0.875rem 0.5rem; }
  .dsb-hint { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-3); margin: 0 0.875rem 0.75rem; line-height: 1.5; }
  .dsb-group { margin-bottom: 0.5rem; }
  .dsb-group-h { font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--slds-g-color-on-surface-2); padding: 0.25rem 0.875rem; }
  .dsb-pitem { display: flex; align-items: center; gap: 0.5rem; margin: 0.25rem 0.5rem; padding: 0.4rem 0.5rem; border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); background: var(--slds-g-color-surface-container-1); cursor: grab; }
  .dsb-pitem:hover { background: var(--slds-g-color-surface-2); border-color: var(--slds-g-color-border-2); }
  .dsb-pitem:active { cursor: grabbing; }
  .dsb-pico { display: inline-flex; width: 26px; height: 26px; border-radius: var(--slds-g-radius-border-2); background: var(--slds-g-color-accent-container-1); align-items: center; justify-content: center; flex: none; }
  .dsb-pitem-l { font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dsb-pitem-d { font-size: 11px; color: var(--slds-g-color-on-surface-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .dsb-canvas { flex: 1; overflow: auto; padding: 2rem 1.5rem; background: var(--slds-g-color-surface-2); }
  .dsb-sheet { max-width: 880px; margin: 0 auto; background: var(--slds-g-color-surface-1); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-4); box-shadow: var(--slds-g-shadow-1); padding: 1.5rem 1.75rem; min-height: 100%; display: flex; flex-direction: column; gap: 1.25rem; }
  .dsb-rec-head { display: flex; align-items: center; gap: 0.75rem; padding-bottom: 1rem; border-bottom: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); outline: 2px solid transparent; outline-offset: 4px; transition: outline-color var(--slds-g-duration-quickly); }
  .dsb-rec-head:not(.preview) { cursor: pointer; }
  .dsb-rec-head:not(.preview):hover { outline-color: var(--slds-g-color-border-3); }
  .dsb-rec-head.sel { outline-color: var(--slds-g-color-accent-1); }
  .dsb-actrow .dsb-ic { background: var(--slds-g-color-surface-3); color: var(--slds-g-color-on-surface-2); }
  .dsb-actrow .dsb-ic:hover { background: var(--slds-g-color-border-2); }
  .dsb-actrow .dsb-ic.del:hover { background: var(--slds-g-color-error-1); color: #fff; }
  .dsb-rec-obj { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-3); }
  .dsb-rec-name { font-size: var(--slds-g-text-heading-medium); font-weight: var(--slds-g-font-weight-bold); }
  .dsb-blank { display: flex; align-items: center; justify-content: center; gap: 0.5rem; min-height: 200px; border: 2px dashed var(--slds-g-color-border-2); border-radius: var(--slds-g-radius-border-4); color: var(--slds-g-color-on-surface-3); }

  .dsb-block { position: relative; outline: 2px solid transparent; outline-offset: 3px; border-radius: var(--slds-g-radius-border-3); transition: outline-color var(--slds-g-duration-quickly); }
  .dsb-block:not(.preview) { cursor: pointer; }
  .dsb-block:not(.preview):hover { outline-color: var(--slds-g-color-border-3); }
  .dsb-block.sel { outline-color: var(--slds-g-color-accent-1); }
  .dsb-block.preview { cursor: default; }

  .dsb-wbar { position: absolute; top: -12px; right: 6px; z-index: 4; display: flex; align-items: center; gap: 3px; height: 22px; padding: 0 4px 0 6px; background: var(--slds-g-color-surface-inverse-1, #181818); color: #fff; border-radius: var(--slds-g-radius-border-pill); opacity: 0; transition: opacity var(--slds-g-duration-quickly); pointer-events: none; }
  .dsb-block:hover .dsb-wbar, .dsb-block.sel .dsb-wbar { opacity: 1; pointer-events: auto; }
  .dsb-grip { display: inline-flex; cursor: grab; color: #fff; opacity: .8; }
  .dsb-wname { font-size: 11px; font-weight: 600; padding-right: 2px; white-space: nowrap; }
  .dsb-ic { width: 18px; height: 18px; border: 0; background: rgba(255,255,255,.14); color: #fff; border-radius: 4px; cursor: pointer; font-size: 9px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .dsb-ic:hover { background: rgba(255,255,255,.3); }
  .dsb-ic.del:hover { background: var(--slds-g-color-error-1); }
  .dsb-insline { position: absolute; left: 0; right: 0; top: -8px; height: 3px; border-radius: 3px; background: var(--slds-g-color-accent-1); z-index: 5; }

  /* nested child selection */
  .dsb-child { position: relative; outline: 1.5px solid transparent; outline-offset: 2px; border-radius: var(--slds-g-radius-border-2); }
  .dsb-child:not(.preview) { cursor: pointer; }
  .dsb-child:not(.preview):hover { outline-color: var(--slds-g-color-border-2); }
  .dsb-child.sel { outline-color: var(--slds-g-color-accent-1); }
  .dsb-cbar { position: absolute; top: -10px; right: 2px; z-index: 4; display: flex; gap: 2px; background: var(--slds-g-color-surface-inverse-1, #181818); border-radius: var(--slds-g-radius-border-pill); padding: 1px 3px; }

  .dsb-insp-body { padding: 0 0.875rem; }
  .dsb-insp-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
  .dsb-insp-title strong { font-size: var(--slds-g-text-heading-small); }
  .dsb-insp-desc { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); margin: 0 0 0.75rem; line-height: 1.45; }
  .dsb-props { margin: 0 0 0.875rem; padding: 0.75rem; background: var(--slds-g-color-surface-2); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); }
  .dsb-align { display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; margin: 0 0 0.875rem; }
  .dsb-align-l { font-size: 12px; font-weight: 600; color: var(--slds-g-color-on-surface-2); }
  .dsb-align-seg { display: inline-flex; border: 1px solid var(--slds-g-color-border-2); border-radius: var(--slds-g-radius-border-2); overflow: hidden; }
  .dsb-align-seg button { width: 30px; height: 28px; border: 0; border-left: 1px solid var(--slds-g-color-border-2); background: var(--slds-g-color-surface-container-1); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .dsb-align-seg button:first-child { border-left: 0; }
  .dsb-align-seg button:hover { background: var(--slds-g-color-surface-2); }
  .dsb-align-seg button.on { background: var(--slds-g-color-accent-1); }
  .dsb-body-sec { margin: 0 0 0.875rem; padding: 0.75rem; background: var(--slds-g-color-accent-container-1); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); }
  .dsb-body-h { display: flex; align-items: center; justify-content: space-between; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--slds-g-color-on-surface-2); margin-bottom: 0.5rem; }
  .dsb-count { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: var(--slds-g-color-accent-1); color: #fff; font-size: 10px; font-weight: 700; }
  .dsb-body-list { display: flex; flex-direction: column; gap: 0.25rem; margin-top: 0.5rem; }
  .dsb-body-item { display: flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.4rem; background: var(--slds-g-color-surface-container-1); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-2); cursor: pointer; }
  .dsb-body-item.on { border-color: var(--slds-g-color-accent-1); }
  .dsb-body-item-l { flex: 1; min-width: 0; font-size: var(--slds-g-text-body-small); font-weight: var(--slds-g-font-weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dsb-body-item .dsb-ic { background: var(--slds-g-color-surface-3); color: var(--slds-g-color-on-surface-2); }
  .dsb-body-item .dsb-ic:hover { background: var(--slds-g-color-border-2); }
  .dsb-body-item .dsb-ic.del:hover { background: var(--slds-g-color-error-1); color: #fff; }
  .dsb-meta { display: grid; grid-template-columns: auto 1fr; gap: 0.375rem 0.75rem; margin: 0 0 1rem; }
  .dsb-meta dt { font-size: 11px; font-weight: 700; letter-spacing: .03em; color: var(--slds-g-color-on-surface-3); }
  .dsb-meta dd { margin: 0; font-size: var(--slds-g-text-body-small); }
  .dsb-meta code { font-family: var(--slds-g-font-family-mono); font-size: 11px; color: var(--slds-g-color-accent-1); }
  .dsb-pagecard { margin: 0.5rem 0.875rem; padding: 0.75rem 0.875rem; background: var(--slds-g-color-surface-2); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); }
  .dsb-pagecard-h { display: flex; align-items: center; gap: 0.5rem; }
  .dsb-pagecard-h strong { font-size: var(--slds-g-text-body-regular); }
  .dsb-insp-actions { display: flex; flex-direction: column; gap: 0.5rem; align-items: stretch; }
  .dsb-insp-actions > * { width: 100%; }
  .dsb-insp-foot { margin-top: auto; display: flex; gap: 0.5rem; padding: 0.875rem; border-top: 1px solid var(--slds-g-color-border-1); font-size: 11px; color: var(--slds-g-color-on-surface-3); line-height: 1.4; }

  .dsb-addscroll { margin-top: 0.875rem; max-height: 54vh; overflow-y: auto; }
  .dsb-addgroup { margin-bottom: 1rem; }
  .dsb-addgroup-h { position: sticky; top: 0; background: var(--slds-g-color-surface-container-1); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--slds-g-color-on-surface-2); padding: 0.375rem 0; z-index: 1; }
  .dsb-addgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .dsb-addcard { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.625rem; border: 1px solid var(--slds-g-color-border-2); border-radius: var(--slds-g-radius-border-3); background: var(--slds-g-color-surface-container-1); cursor: pointer; text-align: left; }
  .dsb-addcard:hover { border-color: var(--slds-g-color-accent-1); background: var(--slds-g-color-accent-container-1); }
  .dsb-addcard-l { font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dsb-addcard-c { font-size: 10.5px; color: var(--slds-g-color-on-surface-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .dsb-export { display: grid; grid-template-columns: 200px 1fr; gap: 1rem; min-height: 380px; }
  .dsb-export-rail { display: flex; flex-direction: column; gap: 0.375rem; }
  .dsb-fmt { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem; border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); background: var(--slds-g-color-surface-container-1); cursor: pointer; text-align: left; }
  .dsb-fmt:hover { background: var(--slds-g-color-surface-2); }
  .dsb-fmt.on { border-color: var(--slds-g-color-accent-1); background: var(--slds-g-color-accent-container-1); }
  .dsb-fmt-l { font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-semibold); }
  .dsb-fmt-s { font-size: 11px; color: var(--slds-g-color-on-surface-3); }
  .dsb-export-main { min-width: 0; display: flex; flex-direction: column; }
  .dsb-export-note { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); line-height: 1.6; margin-bottom: 0.75rem; }
  .dsb-lwc-tabs { display: flex; gap: 0.25rem; margin-bottom: 0.5rem; }
  .dsb-lwc-tabs button { font-family: var(--slds-g-font-family-mono); font-size: 11px; padding: 0.25rem 0.5rem; border: 1px solid var(--slds-g-color-border-2); background: var(--slds-g-color-surface-container-1); border-radius: var(--slds-g-radius-border-2); cursor: pointer; color: var(--slds-g-color-on-surface-2); }
  .dsb-lwc-tabs button.on { background: var(--slds-g-color-accent-1); color: #fff; border-color: var(--slds-g-color-accent-1); }
  .dsb-code-h { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.625rem; background: #1b1b1b; border-radius: var(--slds-g-radius-border-3) var(--slds-g-radius-border-3) 0 0; }
  .dsb-lang { font-size: 9px; font-weight: 700; letter-spacing: .06em; color: #1b1b1b; background: #57a3fd; padding: 1px 5px; border-radius: 3px; }
  .dsb-code-h code { font-family: var(--slds-g-font-family-mono); font-size: 11px; color: #c9c9c9; }
  .dsb-code { flex: 1; margin: 0; padding: 0.875rem; background: #0f0f0f; color: #e5e5e5; border-radius: 0 0 var(--slds-g-radius-border-3) var(--slds-g-radius-border-3); overflow: auto; max-height: 360px; font-family: var(--slds-g-font-family-mono); font-size: 11.5px; line-height: 1.55; }
  .dsb-code code { white-space: pre; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="./catalog.js"></script>
  <script type="text/babel" src="./render.jsx"></script>
  <script src="./export.js"></script>
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
