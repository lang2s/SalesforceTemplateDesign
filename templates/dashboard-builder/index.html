<!-- @template name="Dashboard Builder" description="Drag-and-drop Salesforce dashboard prototyper — 21 widget types on a resizable 12-column grid; exports Dashboard metadata XML, JSON & a mockup outline." -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard Builder — SLDS 2</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--slds-g-color-surface-2); color: var(--slds-g-color-on-surface-1); }
  #app, .dbb { height: 100vh; display: flex; flex-direction: column; }

  /* Toolbar */
  .dbb-bar {
    display: flex; align-items: center; gap: 1rem; flex: none;
    height: 3.25rem; padding: 0 1rem;
    background: var(--slds-g-color-surface-container-1);
    border-bottom: 1px solid var(--slds-g-color-border-1);
    box-shadow: var(--slds-g-shadow-1); z-index: 5;
  }
  .dbb-brand { display: flex; align-items: center; gap: 0.625rem; min-width: 0; }
  .dbb-brand strong { font-size: var(--slds-g-text-heading-small); display: block; line-height: 1.1; white-space: nowrap; }
  .dbb-sub { font-size: 11px; color: var(--slds-g-color-on-surface-3); white-space: nowrap; }
  .dbb-tag { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--slds-g-color-accent-1); background: var(--slds-g-color-accent-container-1); padding: 2px 6px; border-radius: var(--slds-g-radius-border-pill); white-space: nowrap; }

  .dbb-body { flex: 1; display: flex; min-height: 0; }

  /* Side panels */
  .dbb-palette, .dbb-inspect {
    flex: none; width: 252px; overflow-y: auto;
    background: var(--slds-g-color-surface-container-1);
    border-right: 1px solid var(--slds-g-color-border-1);
  }
  .dbb-inspect { border-right: 0; border-left: 1px solid var(--slds-g-color-border-1); width: 280px; display: flex; flex-direction: column; }
  .dbb-palette-h { font-size: var(--slds-g-text-body-small); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--slds-g-color-on-surface-3); padding: 0.875rem 0.875rem 0.5rem; }
  .dbb-hint { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-3); margin: 0 0.875rem 0.75rem; line-height: 1.45; }
  .dbb-group { margin-bottom: 0.5rem; }
  .dbb-group-h { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--slds-g-color-on-surface-2); padding: 0.25rem 0.875rem; }
  .dbb-pitem {
    display: flex; align-items: center; gap: 0.5rem;
    margin: 0.25rem 0.5rem; padding: 0.4rem 0.5rem;
    border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3);
    background: var(--slds-g-color-surface-container-1); cursor: grab;
    transition: background var(--slds-g-duration-quickly), border-color var(--slds-g-duration-quickly);
  }
  .dbb-pitem:hover { background: var(--slds-g-color-surface-2); border-color: var(--slds-g-color-border-2); }
  .dbb-pitem:active { cursor: grabbing; }
  .dbb-pico { display: inline-flex; width: 26px; height: 26px; border-radius: var(--slds-g-radius-border-2); background: var(--slds-g-color-accent-container-1); align-items: center; justify-content: center; flex: none; }
  .dbb-pitem-l { font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dbb-pitem-d { font-size: 11px; color: var(--slds-g-color-on-surface-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Canvas */
  .dbb-canvas { flex: 1; overflow: auto; padding: 1.5rem; background: var(--slds-g-color-surface-2); }
  .dbb-sheet { max-width: 1240px; margin: 0 auto; background: var(--slds-g-color-surface-1); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-4); box-shadow: var(--slds-g-shadow-1); padding: 1.25rem; min-height: 100%; }
  .dbb-grid { display: grid; align-items: stretch; }
  .dbb-blank { display: flex; align-items: center; justify-content: center; gap: 0.5rem; min-height: 220px; border: 2px dashed var(--slds-g-color-border-2); border-radius: var(--slds-g-radius-border-4); color: var(--slds-g-color-on-surface-3); font-size: var(--slds-g-text-body-regular); }

  /* Widget card */
  .dbb-widget {
    position: relative; min-width: 0; min-height: 0;
    display: flex; flex-direction: column;
    background: var(--slds-g-color-surface-container-1);
    border: 1px solid var(--slds-g-color-border-1);
    border-radius: var(--slds-g-radius-border-4);
    box-shadow: var(--slds-g-shadow-1);
    outline: 2px solid transparent; outline-offset: 0;
    transition: outline-color var(--slds-g-duration-quickly), box-shadow var(--slds-g-duration-quickly);
    overflow: hidden;
  }
  .dbb-widget.bare { background: transparent; border: 1px dashed var(--slds-g-color-border-2); box-shadow: none; }
  .dbb-widget:not(.preview) { cursor: pointer; }
  .dbb-widget:not(.preview):hover { outline-color: var(--slds-g-color-border-3); box-shadow: var(--slds-g-shadow-2); }
  .dbb-widget.sel { outline-color: var(--slds-g-color-accent-1); box-shadow: var(--slds-g-shadow-2); }
  .dbb-widget.preview { cursor: default; }

  .dbb-whead { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.75rem 0.25rem; flex: none; }
  .dbb-wtitle { flex: 1; font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-bold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--slds-g-color-on-surface-1); }
  .dbb-wbody { flex: 1; min-height: 0; padding: 0.25rem 0.75rem 0.625rem; display: flex; }
  .dbb-wbody > * { width: 100%; }
  .dbb-widget.bare .dbb-wbody { padding: 0.5rem 0.75rem; align-items: center; }

  .dbb-wbar {
    position: absolute; top: 6px; right: 8px; z-index: 4;
    display: flex; align-items: center; gap: 3px; height: 22px; padding: 0 4px 0 6px;
    background: var(--slds-g-color-surface-inverse-1, #181818); color: #fff;
    border-radius: var(--slds-g-radius-border-pill);
    opacity: 0; transition: opacity var(--slds-g-duration-quickly); pointer-events: none;
  }
  .dbb-widget:hover .dbb-wbar, .dbb-widget.sel .dbb-wbar { opacity: 1; pointer-events: auto; }
  .dbb-grip { display: inline-flex; cursor: grab; color: #fff; opacity: .8; }
  .dbb-wname { font-size: 11px; font-weight: 600; padding-right: 2px; white-space: nowrap; }
  .dbb-ic { width: 18px; height: 18px; border: 0; background: rgba(255,255,255,.14); color: #fff; border-radius: 4px; cursor: pointer; font-size: 9px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .dbb-ic:hover { background: rgba(255,255,255,.3); }
  .dbb-ic.del:hover { background: var(--slds-g-color-error-1); }

  .dbb-resize { position: absolute; right: 2px; bottom: 2px; width: 16px; height: 16px; cursor: nwse-resize; z-index: 4; opacity: 0; }
  .dbb-resize::after { content: ""; position: absolute; right: 3px; bottom: 3px; width: 7px; height: 7px; border-right: 2px solid var(--slds-g-color-accent-1); border-bottom: 2px solid var(--slds-g-color-accent-1); }
  .dbb-widget:hover .dbb-resize, .dbb-widget.sel .dbb-resize { opacity: 1; }
  .dbb-insline { position: absolute; left: -8px; top: 6px; bottom: 6px; width: 3px; border-radius: 3px; background: var(--slds-g-color-accent-1); z-index: 5; }

  /* Inspector */
  .dbb-insp-body { padding: 0 0.875rem; }
  .dbb-insp-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
  .dbb-insp-title strong { font-size: var(--slds-g-text-heading-small); }
  .dbb-insp-desc { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); margin: 0 0 0.75rem; line-height: 1.45; }
  .dbb-size { display: flex; gap: 0.5rem; margin-bottom: 0.875rem; }
  .dbb-stepper { flex: 1; background: var(--slds-g-color-surface-2); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); padding: 0.375rem 0.5rem; }
  .dbb-stepper-l { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--slds-g-color-on-surface-3); }
  .dbb-stepper-c { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
  .dbb-stepper-c span { font-size: var(--slds-g-text-body-regular); font-weight: 700; }
  .dbb-stepper-c em { font-style: normal; font-weight: 400; font-size: 11px; color: var(--slds-g-color-on-surface-3); }
  .dbb-stepper-c button { width: 22px; height: 22px; border: 1px solid var(--slds-g-color-border-2); background: var(--slds-g-color-surface-container-1); border-radius: var(--slds-g-radius-border-2); cursor: pointer; font-size: 14px; line-height: 1; color: var(--slds-g-color-on-surface-1); display: inline-flex; align-items: center; justify-content: center; }
  .dbb-stepper-c button:hover:not(:disabled) { background: var(--slds-g-color-surface-2); }
  .dbb-stepper-c button:disabled { opacity: .4; cursor: default; }

  .dbb-props { margin: 0 0 0.875rem; padding: 0.75rem; background: var(--slds-g-color-surface-2); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); }
  .dbb-pagecard { margin: 0.5rem 0.875rem; padding: 0.75rem 0.875rem; background: var(--slds-g-color-surface-2); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); }
  .dbb-pagecard-h { display: flex; align-items: center; gap: 0.5rem; }
  .dbb-pagecard-h strong { font-size: var(--slds-g-text-body-regular); }
  .dbb-meta { display: grid; grid-template-columns: auto 1fr; gap: 0.375rem 0.75rem; margin: 0 0 1rem; }
  .dbb-meta dt { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--slds-g-color-on-surface-3); }
  .dbb-meta dd { margin: 0; font-size: var(--slds-g-text-body-small); }
  .dbb-meta code { font-family: var(--slds-g-font-family-mono); font-size: 11px; color: var(--slds-g-color-accent-1); word-break: break-all; }
  .dbb-insp-actions { display: flex; flex-direction: column; gap: 0.5rem; align-items: stretch; }
  .dbb-insp-actions > * { width: 100%; }
  .dbb-insp-foot { margin-top: auto; display: flex; gap: 0.5rem; padding: 0.875rem; border-top: 1px solid var(--slds-g-color-border-1); font-size: 11px; color: var(--slds-g-color-on-surface-3); line-height: 1.4; }

  /* Export modal */
  .dbb-export { display: grid; grid-template-columns: 210px 1fr; gap: 1rem; min-height: 380px; }
  .dbb-export-rail { display: flex; flex-direction: column; gap: 0.375rem; }
  .dbb-fmt { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem; border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); background: var(--slds-g-color-surface-container-1); cursor: pointer; text-align: left; }
  .dbb-fmt:hover { background: var(--slds-g-color-surface-2); }
  .dbb-fmt.on { border-color: var(--slds-g-color-accent-1); background: var(--slds-g-color-accent-container-1); }
  .dbb-fmt-l { font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-semibold); }
  .dbb-fmt-s { font-size: 11px; color: var(--slds-g-color-on-surface-3); }
  .dbb-export-main { min-width: 0; display: flex; flex-direction: column; }
  .dbb-export-note { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); line-height: 1.5; margin-bottom: 0.75rem; }
  .dbb-code-h { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.625rem; background: #1b1b1b; border-radius: var(--slds-g-radius-border-3) var(--slds-g-radius-border-3) 0 0; }
  .dbb-lang { font-size: 9px; font-weight: 700; letter-spacing: .06em; color: #1b1b1b; background: #57a3fd; padding: 1px 5px; border-radius: 3px; }
  .dbb-code-h code { font-family: var(--slds-g-font-family-mono); font-size: 11px; color: #c9c9c9; }
  .dbb-code { flex: 1; margin: 0; padding: 0.875rem; background: #0f0f0f; color: #e5e5e5; border-radius: 0 0 var(--slds-g-radius-border-3) var(--slds-g-radius-border-3); overflow: auto; max-height: 360px; font-family: var(--slds-g-font-family-mono); font-size: 11.5px; line-height: 1.55; }
  .dbb-code code { white-space: pre; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="./catalog.js"></script>
  <script type="text/babel" src="./render.jsx"></script>
  <script src="./export.js"></script>
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
