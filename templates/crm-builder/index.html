<!-- @template name="CRM Page Builder" description="Drag-and-drop Lightning page prototyper — 25 components, 6 layouts, page settings; exports FlexiPage XML & LWC code." -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CRM Page Builder — SLDS 2</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--slds-g-color-surface-2); color: var(--slds-g-color-on-surface-1); }
  #app, .crmb { height: 100vh; display: flex; flex-direction: column; }

  /* Toolbar */
  .crmb-bar {
    display: flex; align-items: center; gap: 1rem; flex: none;
    height: 3.25rem; padding: 0 1rem;
    background: var(--slds-g-color-surface-container-1);
    border-bottom: 1px solid var(--slds-g-color-border-1);
    box-shadow: var(--slds-g-shadow-1); z-index: 5;
  }
  .crmb-brand { display: flex; align-items: center; gap: 0.5rem; }
  .crmb-brand strong { font-size: var(--slds-g-text-heading-small); }
  .crmb-tag { font-size: 10px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--slds-g-color-accent-1); background: var(--slds-g-color-accent-container-1); padding: 2px 6px; border-radius: var(--slds-g-radius-border-pill); }

  .crmb-body { flex: 1; display: flex; min-height: 0; }

  /* Palette */
  .crmb-palette, .crmb-inspect {
    flex: none; width: 248px; overflow-y: auto;
    background: var(--slds-g-color-surface-container-1);
    border-right: 1px solid var(--slds-g-color-border-1);
  }
  .crmb-inspect { border-right: 0; border-left: 1px solid var(--slds-g-color-border-1); width: 268px; display: flex; flex-direction: column; }
  .crmb-palette-h { font-size: var(--slds-g-text-body-small); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--slds-g-color-on-surface-3); padding: 0.875rem 0.875rem 0.5rem; }
  .crmb-hint { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-3); margin: 0 0.875rem 0.75rem; line-height: 1.45; }
  .crmb-group { margin-bottom: 0.75rem; }
  .crmb-group-h { font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--slds-g-color-on-surface-2); padding: 0.25rem 0.875rem; }
  .crmb-pitem {
    display: flex; align-items: center; gap: 0.5rem;
    margin: 0.25rem 0.5rem; padding: 0.5rem 0.5rem;
    border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3);
    background: var(--slds-g-color-surface-container-1); cursor: grab;
    transition: background var(--slds-g-duration-quickly), border-color var(--slds-g-duration-quickly);
  }
  .crmb-pitem:hover { background: var(--slds-g-color-surface-2); border-color: var(--slds-g-color-border-2); }
  .crmb-pitem:active { cursor: grabbing; }
  .crmb-pitem-l { font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-semibold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .crmb-pitem-d { font-size: 11px; color: var(--slds-g-color-on-surface-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Canvas */
  .crmb-canvas { flex: 1; overflow-y: auto; padding: 1.5rem; background: var(--slds-g-color-surface-2); }
  .crmb-page { max-width: 1100px; margin: 0 auto; display: flex; flex-direction: column; gap: 1rem; }
  .crmb-row { display: flex; gap: 1rem; align-items: flex-start; }

  /* Property editors + page card in inspector */
  .crmb-props { margin: 0 0.875rem 0.875rem; padding: 0.75rem; background: var(--slds-g-color-surface-2); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); }
  .crmb-pagecard { margin: 0.5rem 0.875rem; padding: 0.75rem 0.875rem; background: var(--slds-g-color-surface-2); border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); }
  .crmb-pagecard-h { display: flex; align-items: center; gap: 0.5rem; }
  .crmb-pagecard-h strong { font-size: var(--slds-g-text-body-regular); }

  .crmb-region { display: flex; flex-direction: column; gap: 1rem; border-radius: var(--slds-g-radius-border-4); transition: background var(--slds-g-duration-quickly); }
  .crmb-region.empty { min-height: 92px; border: 2px dashed var(--slds-g-color-border-2); }
  .crmb-region.over { background: var(--slds-g-color-accent-container-1); outline: 2px solid var(--slds-g-color-accent-1); outline-offset: 2px; }
  .crmb-cols .crmb-region.empty { min-height: 200px; }
  .crmb-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.25rem; color: var(--slds-g-color-on-surface-3); font-size: var(--slds-g-text-body-small); padding: 1rem; }
  .crmb-empty em { font-style: normal; font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--slds-g-color-on-surface-3); opacity: .7; }

  /* Placed block */
  .crmb-block { position: relative; border-radius: var(--slds-g-radius-border-4); outline: 2px solid transparent; transition: outline-color var(--slds-g-duration-quickly); }
  .crmb-block:not(.preview):hover { outline-color: var(--slds-g-color-border-3); }
  .crmb-block.sel { outline-color: var(--slds-g-color-accent-1); }
  .crmb-block-bar {
    position: absolute; top: -11px; right: 10px; z-index: 3;
    display: flex; align-items: center; gap: 4px;
    height: 22px; padding: 0 4px 0 6px;
    background: var(--slds-g-color-surface-inverse-1, #181818); color: #fff;
    border-radius: var(--slds-g-radius-border-pill);
    opacity: 0; transition: opacity var(--slds-g-duration-quickly); pointer-events: none;
  }
  .crmb-block:hover .crmb-block-bar, .crmb-block.sel .crmb-block-bar { opacity: 1; pointer-events: auto; }
  .crmb-grip { display: inline-flex; cursor: grab; color: #fff; opacity: .8; }
  .crmb-block-name { font-size: 11px; font-weight: 600; padding-right: 4px; white-space: nowrap; }
  .crmb-ic { width: 18px; height: 18px; border: 0; background: rgba(255,255,255,.14); color: #fff; border-radius: 4px; cursor: pointer; font-size: 9px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
  .crmb-ic:hover { background: rgba(255,255,255,.3); }
  .crmb-ic.del:hover { background: var(--slds-g-color-error-1); }
  .crmb-block.preview { outline: none; }

  /* Inspector */
  .crmb-insp-body { padding: 0 0.875rem; }
  .crmb-insp-title { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.25rem; }
  .crmb-insp-title strong { font-size: var(--slds-g-text-heading-small); }
  .crmb-insp-desc { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); margin: 0 0 0.875rem; line-height: 1.45; }
  .crmb-meta { display: grid; grid-template-columns: auto 1fr; gap: 0.375rem 0.75rem; margin: 0 0 1rem; }
  .crmb-meta dt { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--slds-g-color-on-surface-3); }
  .crmb-meta dd { margin: 0; font-size: var(--slds-g-text-body-small); }
  .crmb-meta code { font-family: var(--slds-g-font-family-mono); font-size: 11px; color: var(--slds-g-color-accent-1); word-break: break-all; }
  .crmb-insp-actions { display: flex; flex-direction: column; gap: 0.5rem; align-items: stretch; }
  .crmb-insp-actions > * { width: 100%; }
  .crmb-insp-foot { margin-top: auto; display: flex; gap: 0.5rem; padding: 0.875rem; border-top: 1px solid var(--slds-g-color-border-1); font-size: 11px; color: var(--slds-g-color-on-surface-3); line-height: 1.4; }

  /* Export modal */
  .crmb-export { display: grid; grid-template-columns: 200px 1fr; gap: 1rem; min-height: 380px; }
  .crmb-export-rail { display: flex; flex-direction: column; gap: 0.375rem; }
  .crmb-fmt { display: flex; align-items: center; gap: 0.5rem; padding: 0.625rem 0.625rem; border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3); background: var(--slds-g-color-surface-container-1); cursor: pointer; text-align: left; }
  .crmb-fmt:hover { background: var(--slds-g-color-surface-2); }
  .crmb-fmt.on { border-color: var(--slds-g-color-accent-1); background: var(--slds-g-color-accent-container-1); }
  .crmb-fmt-l { font-size: var(--slds-g-text-body-regular); font-weight: var(--slds-g-font-weight-semibold); }
  .crmb-fmt-s { font-size: 11px; color: var(--slds-g-color-on-surface-3); }
  .crmb-export-main { min-width: 0; display: flex; flex-direction: column; }
  .crmb-export-note { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); line-height: 1.5; margin-bottom: 0.75rem; }
  .crmb-lwc-tabs { display: flex; gap: 0.25rem; margin-bottom: 0.5rem; }
  .crmb-lwc-tabs button { font-family: var(--slds-g-font-family-mono); font-size: 11px; padding: 0.25rem 0.5rem; border: 1px solid var(--slds-g-color-border-2); background: var(--slds-g-color-surface-container-1); border-radius: var(--slds-g-radius-border-2); cursor: pointer; color: var(--slds-g-color-on-surface-2); }
  .crmb-lwc-tabs button.on { background: var(--slds-g-color-accent-1); color: #fff; border-color: var(--slds-g-color-accent-1); }
  .crmb-code-h { display: flex; align-items: center; gap: 0.5rem; padding: 0.375rem 0.625rem; background: #1b1b1b; border-radius: var(--slds-g-radius-border-3) var(--slds-g-radius-border-3) 0 0; }
  .crmb-lang { font-size: 9px; font-weight: 700; letter-spacing: .06em; color: #1b1b1b; background: #57a3fd; padding: 1px 5px; border-radius: 3px; }
  .crmb-code-h code { font-family: var(--slds-g-font-family-mono); font-size: 11px; color: #c9c9c9; }
  .crmb-code { flex: 1; margin: 0; padding: 0.875rem; background: #0f0f0f; color: #e5e5e5; border-radius: 0 0 var(--slds-g-radius-border-3) var(--slds-g-radius-border-3); overflow: auto; max-height: 360px; font-family: var(--slds-g-font-family-mono); font-size: 11.5px; line-height: 1.55; }
  .crmb-code code { white-space: pre; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="./catalog.js"></script>
  <script type="text/babel" src="./render.jsx"></script>
  <script src="./export.js"></script>
  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
