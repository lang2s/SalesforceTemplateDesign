<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--slds-g-color-surface-1); }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Modal, Button, Input } = window.SalesforceSLDS2DesignSystem_2eee88;
    /* Render the modal inline (not fixed) so it sits inside the card frame. */
    function InlineModal() {
      return (
        <div style={{ position: 'relative', height: 260, borderRadius: 12, overflow: 'hidden', background: 'rgba(24,24,24,0.55)' }}>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16 }}>
            <div style={{ width: '100%', maxWidth: 420, background: 'var(--slds-g-color-surface-container-1)', borderRadius: 'var(--slds-g-radius-border-5)', boxShadow: 'var(--slds-g-shadow-4)', overflow: 'hidden' }}>
              <div style={{ position: 'relative', padding: '1rem 3rem 0.875rem 1.25rem', borderBottom: '1px solid var(--slds-g-color-border-1)' }}>
                <h2 style={{ fontSize: 'var(--slds-g-text-heading-large)', margin: 0 }}>New Contact</h2>
                <p style={{ marginTop: 4, fontSize: 'var(--slds-g-text-body-small)', color: 'var(--slds-g-color-on-surface-3)' }}>Add a contact to Global Media</p>
                <span className="material-symbols-rounded" style={{ position: 'absolute', top: 14, right: 14, fontSize: 20, color: 'var(--slds-g-color-on-surface-2)' }}>close</span>
              </div>
              <div style={{ padding: '1.25rem', display: 'flex', flexDirection: 'column', gap: 12 }}>
                <Input label="Name" placeholder="Jane Doe" />
                <Input label="Email" type="email" placeholder="jane@acme.com" />
              </div>
              <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 12, padding: '0.875rem 1.25rem', borderTop: '1px solid var(--slds-g-color-border-1)', background: 'var(--slds-g-color-surface-2)' }}>
                <Button variant="neutral" label="Cancel" />
                <Button variant="brand" label="Save" />
              </div>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<InlineModal />);
  </script>
</body>
</html>
