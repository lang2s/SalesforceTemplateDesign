<!-- @dsCard group="Components" viewport="700x420" name="Feedback" subtitle="Tabs, Alert, Toast & Spinner" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--slds-g-color-surface-1); }
  .lbl { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); margin: 16px 0 10px; }
  .lbl:first-child { margin-top: 0; }
  .stack { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .row { display: flex; gap: 18px; align-items: center; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Tabs, Alert, Toast, Spinner } = window.SalesforceSLDS2DesignSystem_2eee88;
    function Demo() {
      const [tab, setTab] = React.useState('details');
      return (
        <div>
          <p className="lbl">Tabs</p>
          <Tabs value={tab} onChange={setTab} tabs={[
            {label:'Details', value:'details'},
            {label:'Related', value:'related'},
            {label:'News', value:'news'},
            {label:'Activity', value:'activity'},
          ]} />
          <p className="lbl">Alerts (persistent, full-width)</p>
          <div className="stack" style={{ alignSelf: 'stretch' }}>
            <Alert variant="warning" onClose={()=>{}}>Your trial ends in 3 days. Add billing to keep access.</Alert>
            <Alert variant="error">We couldn't reach the server. Retrying…</Alert>
          </div>
          <p className="lbl">Toasts (transient)</p>
          <div className="stack">
            <Toast variant="success" title="Success!" message="Contact saved." onClose={()=>{}} />
            <Toast variant="error" title="Error." message="Close date is invalid." onClose={()=>{}} />
            <Toast variant="warning" message="This record has unsaved changes." onClose={()=>{}} />
          </div>
          <p className="lbl">Spinner</p>
          <div className="row">
            <Spinner size="x-small" />
            <Spinner size="small" />
            <Spinner size="medium" />
            <Spinner size="large" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
