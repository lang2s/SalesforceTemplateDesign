<!-- @dsCard group="Components" viewport="700x360" name="Navigation" subtitle="Breadcrumbs & Vertical Navigation" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--slds-g-color-surface-1); }
  .lbl { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); margin: 0 0 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Breadcrumbs, VerticalNavigation } = window.SalesforceSLDS2DesignSystem_2eee88;
    function Demo() {
      const [nav, setNav] = React.useState('recent');
      return (
        <div>
          <p className="lbl">Breadcrumbs</p>
          <Breadcrumbs items={[
            { label: 'Sales', href: '#' },
            { label: 'Contacts', href: '#' },
            { label: 'Lando Voss' },
          ]} />
          <p className="lbl" style={{marginTop:18}}>Vertical Navigation</p>
          <div style={{maxWidth:260, border:'1px solid var(--slds-g-color-border-1)', borderRadius:'var(--slds-g-radius-border-4)', padding:'10px 4px', background:'var(--slds-g-color-surface-container-1)'}}>
            <VerticalNavigation value={nav} onSelect={setNav} sections={[
              { label: 'Reporting', items: [
                { id:'recent', label:'Recent', iconName:'utility:clock', badge:12 },
                { id:'created', label:'Created by Me', iconName:'utility:user' },
                { id:'private', label:'Private Reports', iconName:'utility:lock', badge:3 },
              ]},
              { label: 'Folders', items: [
                { id:'sales', label:'Sales Reports', iconName:'utility:open_folder' },
              ]},
            ]} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
