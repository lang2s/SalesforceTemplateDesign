<!-- @dsCard group="Components" viewport="700x320" name="Progress" subtitle="Sales Path, stepper, Progress Bar & Ring" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; background: var(--slds-g-color-surface-1); }
  .lbl { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); margin: 18px 0 12px; }
  .lbl:first-child { margin-top: 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { ProgressIndicator, ProgressBar, ProgressRing } = window.SalesforceSLDS2DesignSystem_2eee88;
    function Demo() {
      return (
        <div>
          <p className="lbl">Sales Path — current: Negotiation</p>
          <ProgressIndicator variant="path" current={3}
            steps={['Qualification','Needs Analysis','Proposal','Negotiation','Closed Won']} />
          <p className="lbl">Guided-flow stepper — step 2 of 4</p>
          <div style={{ maxWidth: 420 }}>
            <ProgressIndicator variant="base" current={1}
              steps={['Account','Details','Review','Confirm']} />
          </div>
          <p className="lbl">Progress Bar &amp; Ring</p>
          <div style={{ display:'flex', alignItems:'center', gap:24 }}>
            <div style={{ flex:1, maxWidth:360 }}>
              <ProgressBar value={68} label="Quota attainment" showValue />
              <div style={{height:10}} />
              <ProgressBar value={100} variant="success" size="small" />
            </div>
            <ProgressRing value={75} size={44} showValue />
            <ProgressRing value={100} size={44} variant="success" showValue />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
