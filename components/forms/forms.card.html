<!-- @dsCard group="Components" viewport="700x520" name="Forms" subtitle="Input, Select, Textarea, Slider, Combobox, Checkbox, Radio, Toggle, Dual Listbox & File Upload" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--slds-g-color-surface-container-1); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; align-items: start; }
  .lbl { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); margin: 0 0 10px; }
  .stack { display: flex; flex-direction: column; gap: 12px; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Select, Textarea, Slider, Combobox, Checkbox, RadioGroup, Toggle, CheckboxGroup, DualListbox, FileUpload } = window.SalesforceSLDS2DesignSystem_2eee88;
    function Demo() {
      return (
        <div className="grid">
          <div className="stack">
            <Input label="Account Name" defaultValue="Acme Corporation" />
            <Input label="Email" type="email" iconName="utility:search" placeholder="name@company.com" />
            <Input label="Close Date" required error="Enter a valid date" defaultValue="13/40/2026" />
          </div>
          <div className="stack">
            <Combobox label="Stage" defaultValue="negotiation" options={[
              {label:'Qualification', value:'qual'},
              {label:'Needs Analysis', value:'needs'},
              {label:'Negotiation/Review', value:'negotiation'},
              {label:'Closed Won', value:'won'},
            ]} />
            <div>
              <p className="lbl" style={{margin:'0 0 8px'}}>Selection</p>
              <div className="stack">
                <Checkbox label="Send confirmation email" defaultChecked />
                <Checkbox label="Add to campaign" />
                <Toggle label="Notify my team" defaultChecked />
              </div>
            </div>
            <RadioGroup label="Priority" defaultValue="high" options={[
              {label:'High', value:'high'},
              {label:'Medium', value:'med'},
              {label:'Low', value:'low'},
            ]} />
          </div>
          <div className="stack">
            <Select label="Industry" options={[{label:'Technology', value:'tech'},{label:'Finance', value:'fin'},{label:'Healthcare', value:'health'}]} />
            <Slider label="Probability" min={0} max={100} step={5} defaultValue={75} unit="%" />
            <Textarea label="Description" rows={2} placeholder="Add details…" />
          </div>
          <div className="stack">
            <DualListbox label="Permissions" defaultValue={['read']} options={[
              {label:'Read', value:'read'},{label:'Edit', value:'edit'},{label:'Delete', value:'delete'},{label:'Share', value:'share'},
            ]} />
          </div>
          <div className="stack" style={{gridColumn:'1 / -1'}}>
            <FileUpload label="Attachments" />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
