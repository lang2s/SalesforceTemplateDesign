<!-- @dsCard group="Components" viewport="700x420" name="Containers" subtitle="Accordion, Tile, Carousel & Layout grid" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--slds-g-color-surface-1); }
  .lbl { font-size: 10.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); margin: 18px 0 10px; }
  .lbl:first-child { margin-top: 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Accordion, Tile, Layout, LayoutItem, Badge, ButtonMenu } = window.SalesforceSLDS2DesignSystem_2eee88;
    function Demo() {
      return (
        <div>
          <p className="lbl">Accordion</p>
          <Accordion allowMultiple defaultActive={["a"]} sections={[
            { id: "a", label: "Contact Information", content: <span>Phone, email, and mailing address fields.</span> },
            { id: "b", label: "Additional Details", content: <span>Lead source, department, and description.</span> },
          ]} />
          <p className="lbl">Tile + Layout grid</p>
          <Layout gutters>
            <LayoutItem size={6}>
              <Tile title="Global Media — Renewal" href="#" iconName="standard:opportunity"
                meta={[{label:'Amount', value:'$240,000'}, {label:'Stage', value:'Negotiation'}]}
                actions={<ButtonMenu iconName="utility:down" items={[{label:'Edit'},{label:'Delete', destructive:true}]} />} />
            </LayoutItem>
            <LayoutItem size={6}>
              <Tile title="Acme — Expansion" href="#" iconName="standard:opportunity"
                meta={[{label:'Amount', value:'$410,000'}, {label:'Stage', value:'Proposal'}]}
                actions={<Badge variant="brand" label="60%" />} />
            </LayoutItem>
          </Layout>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
