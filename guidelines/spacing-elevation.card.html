<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft, low-contrast shadows — hairline to overlay" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px 22px; background: var(--slds-g-color-surface-1); display:flex; gap: 26px; flex-wrap: wrap; }
  .cell { text-align:center; }
  .box { width: 110px; height: 64px; background: var(--slds-g-color-surface-container-1); border-radius: var(--slds-g-radius-border-4); }
  .name { font-size: 11px; font-weight: 600; color: var(--slds-g-color-on-surface-1); margin-top: 12px; }
  .tok { font-family: var(--slds-g-font-family-mono); font-size: 9.5px; color: var(--slds-g-color-on-surface-3); }
</style>
</head>
<body>
  <div class="cell"><div class="box" style="box-shadow:var(--slds-g-shadow-1)"></div><div class="name">shadow-1</div><div class="tok">hairline</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--slds-g-shadow-2)"></div><div class="name">shadow-2</div><div class="tok">cards</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--slds-g-shadow-3)"></div><div class="name">shadow-3</div><div class="tok">hover lift</div></div>
  <div class="cell"><div class="box" style="box-shadow:var(--slds-g-shadow-4)"></div><div class="name">shadow-4</div><div class="tok">popover / modal</div></div>
</body>
</html>
