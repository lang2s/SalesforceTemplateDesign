<!-- @dsCard group="Type" viewport="700x260" name="Headings & Display" subtitle="Display down to heading-small — tight, bold, neutral-10" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--slds-g-color-surface-container-1); }
  .line { display:flex; align-items:baseline; gap: 16px; padding: 5px 0; border-bottom: 1px solid var(--slds-g-color-border-1); }
  .line:last-child { border-bottom: 0; }
  .tok { font-family: var(--slds-g-font-family-mono); font-size: 10px; color: var(--slds-g-color-on-surface-3); width: 150px; flex: none; }
  .spec { color: var(--slds-g-color-on-surface-1); }
</style>
</head>
<body>
  <div class="line"><span class="tok">display-large · 52</span><span class="spec" style="font-size:var(--slds-g-text-display-large); font-weight:700; letter-spacing:-.02em; line-height:1">Sell faster</span></div>
  <div class="line"><span class="tok">display-medium · 32</span><span class="spec" style="font-size:var(--slds-g-text-display-medium); font-weight:700; letter-spacing:-.015em">Close more deals</span></div>
  <div class="line"><span class="tok">heading-x-large · 24</span><span class="spec" style="font-size:var(--slds-g-text-heading-x-large); font-weight:700">Pipeline overview</span></div>
  <div class="line"><span class="tok">heading-large · 20</span><span class="spec" style="font-size:var(--slds-g-text-heading-large); font-weight:700">Opportunities</span></div>
  <div class="line"><span class="tok">heading-medium · 16</span><span class="spec" style="font-size:var(--slds-g-text-heading-medium); font-weight:600">Contact details</span></div>
  <div class="line"><span class="tok">heading-small · 14</span><span class="spec" style="font-size:var(--slds-g-text-heading-small); font-weight:600">Recent activity</span></div>
</body>
</html>
