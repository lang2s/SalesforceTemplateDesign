<!-- @dsCard group="Spacing" viewport="700x190" name="Radius" subtitle="Cosmos rounding — radius-2 controls up to pill" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--slds-g-color-surface-container-1); display:flex; gap: 20px; flex-wrap: wrap; align-items:flex-end; }
  .cell { text-align:center; }
  .box { width: 72px; height: 56px; background: var(--slds-g-color-accent-container-1); border: 1.5px solid var(--slds-g-color-accent-1); }
  .name { font-size: 11px; font-weight: 600; color: var(--slds-g-color-on-surface-1); margin-top: 8px; }
  .tok { font-family: var(--slds-g-font-family-mono); font-size: 9.5px; color: var(--slds-g-color-on-surface-3); }
</style>
</head>
<body>
  <div class="cell"><div class="box" style="border-radius:var(--slds-g-radius-border-2)"></div><div class="name">radius-2</div><div class="tok">4px</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--slds-g-radius-border-3)"></div><div class="name">radius-3</div><div class="tok">8px · controls</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--slds-g-radius-border-4)"></div><div class="name">radius-4</div><div class="tok">12px · cards</div></div>
  <div class="cell"><div class="box" style="border-radius:var(--slds-g-radius-border-5)"></div><div class="name">radius-5</div><div class="tok">16px</div></div>
  <div class="cell"><div class="box" style="width:96px; border-radius:var(--slds-g-radius-border-pill)"></div><div class="name">pill</div><div class="tok">badges</div></div>
  <div class="cell"><div class="box" style="width:56px; border-radius:var(--slds-g-radius-border-circle)"></div><div class="name">circle</div><div class="tok">avatars</div></div>
</body>
</html>
