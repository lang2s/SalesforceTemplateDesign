<!-- @dsCard group="Colors" viewport="700x150" name="Dark Mode" subtitle="Cosmos dark theme — data-slds-theme=&quot;dark&quot;" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--slds-g-color-surface-1); display:flex; gap: 10px; flex-wrap: wrap; align-items:flex-start; }
  .sw { width: 96px; }
  .chip { height: 46px; border-radius: var(--slds-g-radius-border-3); border: 1px solid var(--slds-g-color-border-1); }
  .name { font-size: 11px; font-weight: 600; color: var(--slds-g-color-on-surface-1); margin-top: 6px; }
  .tok { font-family: var(--slds-g-font-family-mono); font-size: 9.5px; color: var(--slds-g-color-on-surface-3); }
</style>
</head>
<body>
  <div class="sw"><div class="chip" style="background:var(--slds-g-color-surface-1)"></div><div class="name">surface-1</div></div>
  <div class="sw"><div class="chip" style="background:var(--slds-g-color-surface-container-1)"></div><div class="name">container-1</div></div>
  <div class="sw"><div class="chip" style="background:var(--slds-g-color-surface-3)"></div><div class="name">surface-3</div></div>
  <div class="sw"><div class="chip" style="background:var(--slds-g-color-accent-1)"></div><div class="name">accent-1</div><div class="tok">brightened</div></div>
  <div class="sw"><div class="chip" style="background:var(--slds-g-color-success-1)"></div><div class="name">success-1</div></div>
  <div class="sw"><div class="chip" style="background:var(--slds-g-color-error-1)"></div><div class="name">error-1</div></div>
</body>
</html>
