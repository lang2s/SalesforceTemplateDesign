<!-- @dsCard group="Spacing" viewport="700x200" name="Spacing Scale" subtitle="Base 4px unit — numeric 1–8 and SLDS t-shirt names" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 22px; background: var(--slds-g-color-surface-container-1); }
  .line { display:flex; align-items:center; gap: 14px; padding: 4px 0; }
  .tok { font-family: var(--slds-g-font-family-mono); font-size: 10.5px; color: var(--slds-g-color-on-surface-2); width: 230px; flex:none; }
  .bar { height: 14px; background: var(--slds-g-color-accent-1); border-radius: 2px; }
</style>
</head>
<body>
  <div class="line"><span class="tok">x-small · spacing-2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="line"><span class="tok">small · spacing-3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="line"><span class="tok">medium · spacing-4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="line"><span class="tok">large · spacing-5 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="line"><span class="tok">x-large · spacing-6 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="line"><span class="tok">xx-large · spacing-7 · 48px</span><div class="bar" style="width:48px"></div></div>
  <div class="line"><span class="tok">spacing-8 · 64px</span><div class="bar" style="width:64px"></div></div>
</body>
</html>
