<!-- @dsCard group="Colors" viewport="700x190" name="Brand & Accent" subtitle="Salesforce blue — accent-1 is the brand anchor" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 18px 20px; background: var(--slds-g-color-surface-container-1); }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .sw { width: 92px; }
  .chip { height: 56px; border-radius: var(--slds-g-radius-border-3); border: 1px solid rgba(0,0,0,.06); }
  .name { font-size: 11px; font-weight: 600; color: var(--slds-g-color-on-surface-1); margin-top: 6px; }
  .hex { font-family: var(--slds-g-font-family-mono); font-size: 10px; color: var(--slds-g-color-on-surface-3); }
  .grp { font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); margin: 0 0 12px; }
</style>
</head>
<body>
  <p class="grp">Blue · brand ramp</p>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--slds-g-color-palette-blue-10)"></div><div class="name">blue-10</div><div class="hex">#eef4ff</div></div>
    <div class="sw"><div class="chip" style="background:var(--slds-g-color-palette-blue-30)"></div><div class="name">blue-30</div><div class="hex">#78b0fd</div></div>
    <div class="sw"><div class="chip" style="background:var(--slds-g-color-palette-blue-40)"></div><div class="name">blue-40</div><div class="hex">#1b96ff</div></div>
    <div class="sw"><div class="chip" style="background:var(--slds-g-color-palette-blue-50); box-shadow: 0 0 0 2px var(--slds-g-color-palette-blue-50), 0 0 0 4px var(--slds-g-color-palette-blue-20)"></div><div class="name">blue-50 ◆</div><div class="hex">#0176d3</div></div>
    <div class="sw"><div class="chip" style="background:var(--slds-g-color-palette-blue-60)"></div><div class="name">blue-60</div><div class="hex">#0b5cab</div></div>
    <div class="sw"><div class="chip" style="background:var(--slds-g-color-palette-blue-65)"></div><div class="name">blue-65</div><div class="hex">#014486</div></div>
    <div class="sw"><div class="chip" style="background:var(--slds-g-color-palette-blue-70)"></div><div class="name">blue-70</div><div class="hex">#032d60</div></div>
  </div>
</body>
</html>
