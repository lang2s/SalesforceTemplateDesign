<!-- @dsCard group="Iconography" viewport="900x620" name="Icon Gallery" subtitle="All 1,764 SLDS icons — utility, standard, action, doctype, custom" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--slds-g-color-surface-1); color: var(--slds-g-color-on-surface-1);
         font-family: var(--slds-g-font-family, "Salesforce Sans", system-ui, sans-serif); }
  .wrap { display: flex; flex-direction: column; height: 100vh; }
  header { flex: none; padding: 16px 20px 0; background: var(--slds-g-color-surface-container-1);
           border-bottom: 1px solid var(--slds-g-color-border-1); }
  .title { font-size: var(--slds-g-text-heading-3, 20px); font-weight: 700; margin: 0 0 2px; }
  .sub { font-size: var(--slds-g-text-body-small, 12px); color: var(--slds-g-color-on-surface-3); margin: 0 0 14px; }
  .controls { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .search { position: relative; flex: 1; min-width: 220px; max-width: 420px; }
  .search input { width: 100%; height: 36px; padding: 0 12px 0 36px; font-size: 14px;
    border: 1px solid var(--slds-g-color-border-2); border-radius: 999px; outline: none;
    background: var(--slds-g-color-surface-1); color: inherit; }
  .search input:focus { border-color: var(--slds-g-color-accent-1); box-shadow: var(--slds-g-shadow-focus, 0 0 0 3px rgba(1,118,211,.25)); }
  .search .ic { position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; fill: var(--slds-g-color-on-surface-3); pointer-events: none; }
  .tabs { display: flex; gap: 2px; margin: 0; padding: 0; }
  .tab { appearance: none; border: none; background: none; cursor: pointer; padding: 10px 14px;
    font-size: 13px; font-weight: 600; color: var(--slds-g-color-on-surface-3);
    border-bottom: 2px solid transparent; font-family: inherit; white-space: nowrap; }
  .tab:hover { color: var(--slds-g-color-on-surface-1); }
  .tab.active { color: var(--slds-g-color-accent-1); border-bottom-color: var(--slds-g-color-accent-1); }
  .tab .ct { color: var(--slds-g-color-on-surface-4, #939393); font-weight: 500; margin-left: 5px; font-size: 12px; }
  .tabrow { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; }
  .count { font-size: 12px; color: var(--slds-g-color-on-surface-3); padding-bottom: 11px; white-space: nowrap; }
  main { flex: 1; overflow: auto; padding: 18px 20px 40px; }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 12px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 11px; padding: 18px 8px 13px;
    border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-3, 8px);
    background: var(--slds-g-color-surface-container-1); cursor: pointer; transition: box-shadow .1s, border-color .1s; min-height: 116px; justify-content: center; }
  .cell:hover { border-color: var(--slds-g-color-accent-1); box-shadow: var(--slds-g-shadow-2, 0 2px 4px rgba(0,0,0,.08)); }
  .cell.copied { border-color: var(--slds-g-color-success-1, #2e844a); }
  .cell .name { font-size: 12.5px; color: var(--slds-g-color-on-surface-2); text-align: center;
    word-break: break-word; line-height: 1.3; max-width: 100%; }
  .cell.copied .name::after { content: " \2713 copied"; color: var(--slds-g-color-success-1, #2e844a); font-weight: 600; }
  .glyph { width: 32px; height: 32px; fill: var(--slds-g-color-on-surface-2); }
  .tile { width: 46px; height: 46px; border-radius: var(--slds-g-radius-border-3, 8px);
    display: flex; align-items: center; justify-content: center; flex: none; }
  .tile svg { width: 28px; height: 28px; fill: #fff; }
  .doc { width: 36px; height: 44px; }
  .empty { text-align: center; color: var(--slds-g-color-on-surface-3); padding: 60px 0; font-size: 14px; }
  .loading { text-align: center; color: var(--slds-g-color-on-surface-3); padding: 60px 0; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="title">SLDS Iconography</h1>
    <p class="sub">The official Salesforce Lightning Design System icon set. Click any icon to copy its <code>category:name</code> reference.</p>
    <div class="controls">
      <div class="search">
        <svg class="ic" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.49 4.49 0 0 1 9.5 14z"/></svg>
        <input id="q" type="text" placeholder="Search icons by name…" autocomplete="off">
      </div>
    </div>
    <div class="tabrow">
      <div class="tabs" id="tabs"></div>
      <div class="count" id="count"></div>
    </div>
  </header>
  <main id="main"><div class="loading">Loading icon sprites…</div></main>
</div>
<script>
(function () {
  var CATS = [
    { id: "utility",  label: "Utility",  kind: "glyph" },
    { id: "standard", label: "Standard", kind: "tile", bg: "#5867e8" },
    { id: "action",   label: "Action",   kind: "tile", bg: "#0d9dda" },
    { id: "doctype",  label: "Doctype",  kind: "doc" },
    { id: "custom",   label: "Custom",   kind: "tile", bg: "#0176d3" }
  ];
  // Authentic standard-object tile colors (subset that Salesforce ships distinctly)
  var STD_COLORS = {
    account:"#7f8de1", contact:"#469bd6", opportunity:"#fcb95b", lead:"#f88962",
    case:"#f2cf5b", task:"#4bca81", event:"#eb7092", campaign:"#f49756",
    dashboard:"#ee5e5b", report:"#06a59a", user:"#65cae4", product:"#5cb88e",
    quote:"#8a90eb", contract:"#16325c", order:"#709fce", asset_object:"#5bc6dd",
    note:"#ddca5a", email:"#95aec5", call:"#56aadf", goals:"#f88962",
    forecasts:"#56aadf", groups:"#41b6e6", knowledge:"#16325c", solution:"#56aadf"
  };
  var ids = {};   // cat -> [names]
  var base = (function () {
    var s = document.querySelector('link[href*="styles.css"]');
    if (s) return s.getAttribute("href").replace(/styles\.css.*$/, "");
    return "../";
  })();

  var active = "utility";
  var query = "";

  function copyText(text) {
    // navigator.clipboard is often blocked inside sandboxed iframes, which
    // leaves the browser's default behaviour (copying the clicked image) in
    // place. Use a hidden textarea + execCommand fallback so the COMMAND
    // string is always what lands on the clipboard.
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).catch(function () { legacyCopy(text); });
    } else {
      legacyCopy(text);
    }
  }
  function legacyCopy(text) {
    try {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.cssText = "position:fixed;top:0;left:0;opacity:0;pointer-events:none";
      document.body.appendChild(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      document.execCommand("copy");
      document.body.removeChild(ta);
    } catch (e) { /* noop */ }
  }

  function tileBg(cat, name) {
    if (cat === "standard") return STD_COLORS[name] || CATS[1].bg;
    var c = CATS.find(function (x) { return x.id === cat; });
    return c ? c.bg : "#0176d3";
  }

  function buildTabs() {
    var t = document.getElementById("tabs");
    t.innerHTML = "";
    CATS.forEach(function (c) {
      var n = (ids[c.id] || []).length;
      var b = document.createElement("button");
      b.className = "tab" + (c.id === active ? " active" : "");
      b.innerHTML = c.label + '<span class="ct">' + n + "</span>";
      b.onclick = function () { active = c.id; query = ""; document.getElementById("q").value = ""; buildTabs(); render(); };
      t.appendChild(b);
    });
  }

  function render() {
    var main = document.getElementById("main");
    var cat = CATS.find(function (x) { return x.id === active; });
    var list = (ids[active] || []).filter(function (n) {
      return !query || n.toLowerCase().indexOf(query) !== -1;
    });
    document.getElementById("count").textContent =
      list.length + (query ? " of " + (ids[active] || []).length : "") + " icons";
    if (!list.length) { main.innerHTML = '<div class="empty">No icons match “' + query + '”.</div>'; return; }
    var grid = document.createElement("div");
    grid.className = "grid";
    var frag = document.createDocumentFragment();
    list.forEach(function (name) {
      var cell = document.createElement("div");
      cell.className = "cell";
      cell.title = active + ":" + name;
      var href = "#slds-" + active + "-" + name;
      var visual;
      if (cat.kind === "glyph") {
        visual = '<svg class="glyph" aria-hidden="true"><use href="' + href + '"></use></svg>';
      } else if (cat.kind === "doc") {
        visual = '<svg class="doc" aria-hidden="true"><use href="' + href + '"></use></svg>';
      } else {
        visual = '<span class="tile" style="background:' + tileBg(active, name) + '">' +
                 '<svg aria-hidden="true"><use href="' + href + '"></use></svg></span>';
      }
      cell.innerHTML = visual + '<span class="name">' + name + "</span>";
      cell.onclick = function () {
        copyText(active + ":" + name);
        cell.classList.add("copied");
        setTimeout(function () { cell.classList.remove("copied"); }, 1100);
      };
      frag.appendChild(cell);
    });
    grid.appendChild(frag);
    main.innerHTML = "";
    main.appendChild(grid);
    main.scrollTop = 0;
  }

  document.getElementById("q").addEventListener("input", function (e) {
    query = e.target.value.trim().toLowerCase();
    render();
  });

  (async function load() {
    if (document.getElementById("__slds_gallery_sprites")) { afterLoad(); return; }
    var inner = "";
    for (var i = 0; i < CATS.length; i++) {
      var cat = CATS[i].id;
      try {
        var res = await fetch(base + "assets/icons/" + cat + ".svg");
        if (!res.ok) continue;
        var txt = await res.text();
        var set = [];
        txt.replace(/<symbol[^>]*\bid="([^"]+)"/g, function (m, id) { set.push(id); return m; });
        set.sort();
        ids[cat] = set;
        txt = txt.replace(/(<symbol[^>]*\bid=")([^"]+)(")/g, function (m, a, id, b) {
          return a + "slds-" + cat + "-" + id + b;
        });
        inner += txt.replace(/^[\s\S]*?<svg[^>]*>/, "").replace(/<\/svg>\s*$/, "");
      } catch (e) { /* skip */ }
    }
    var holder = document.createElement("div");
    holder.setAttribute("aria-hidden", "true");
    holder.style.cssText = "position:absolute;width:0;height:0;overflow:hidden";
    holder.innerHTML = '<svg id="__slds_gallery_sprites" xmlns="http://www.w3.org/2000/svg">' + inner + "</svg>";
    document.body.appendChild(holder.firstChild);
    afterLoad();
  })();

  function afterLoad() {
    buildTabs();
    render();
  }
})();
</script>
</body>
</html>
