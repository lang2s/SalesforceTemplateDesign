<!-- @dsCard group="Type" viewport="700x180" name="Typeface" subtitle="Salesforce Sans — the Cosmos UI typeface, weights 300–700" -->
<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px 22px; background: var(--slds-g-color-surface-container-1); color: var(--slds-g-color-on-surface-1); }
  .big { font-size: 48px; font-weight: 700; letter-spacing: -.02em; line-height: 1; }
  .sub { font-size: 13px; color: var(--slds-g-color-on-surface-3); margin: 4px 0 16px; }
  .weights { display:flex; gap: 22px; flex-wrap: wrap; }
  .w span { display:block; font-size: 22px; }
  .w small { font-size: 10px; color: var(--slds-g-color-on-surface-3); font-family: var(--slds-g-font-family-mono); }
</style>
</head>
<body>
  <div class="big">Salesforce Sans</div>
  <div class="sub">the Cosmos UI typeface · Public Sans is the metric-compatible fallback</div>
  <div class="weights">
    <div class="w"><span style="font-weight:300">Aa</span><small>300 light</small></div>
    <div class="w"><span style="font-weight:400">Aa</span><small>400 regular</small></div>
    <div class="w"><span style="font-weight:500">Aa</span><small>500 medium</small></div>
    <div class="w"><span style="font-weight:600">Aa</span><small>600 semibold</small></div>
    <div class="w"><span style="font-weight:700">Aa</span><small>700 bold</small></div>
  </div>
</body>
</html>
