<!DOCTYPE html>
<html lang="en" data-slds-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SLDS 2 — Visualforce Component Reference</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Roboto+Mono:wght@400;500&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap">
<link rel="stylesheet" href="../styles.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--slds-g-color-surface-1); color: var(--slds-g-color-on-surface-1); }
  #app { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

  .side {
    position: sticky; top: 0; align-self: start; height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
    border-right: 1px solid var(--slds-g-color-border-1);
    background: var(--slds-g-color-surface-container-1);
  }
  .side-head { padding: 1rem 1rem 0.75rem; border-bottom: 1px solid var(--slds-g-color-border-1); }
  .eyebrow { display: flex; align-items: center; gap: 0.4rem; font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); margin-bottom: 0.625rem; }
  .eyebrow .bolt { color: #5867e8; font-size: 18px; }
  .side-head h1 { font-size: var(--slds-g-text-heading-small); font-weight: var(--slds-g-font-weight-bold); margin: 0 0 0.75rem; line-height: 1.2; color: var(--slds-g-color-on-surface-1); }
  .search { display: flex; align-items: center; gap: 0.45rem; height: 2.25rem; padding: 0 0.5rem; border: 1px solid var(--slds-g-color-border-2); border-radius: var(--slds-g-radius-border-2); background: var(--slds-g-color-surface-container-1); }
  .search:focus-within { border-color: var(--slds-g-color-accent-1); box-shadow: 0 0 0 1px var(--slds-g-color-accent-1); }
  .search input { flex: 1; border: 0; outline: none; background: transparent; font-size: var(--slds-g-text-body-regular); color: var(--slds-g-color-on-surface-1); }
  .search .kbd { font-size: 11px; color: var(--slds-g-color-on-surface-3); border: 1px solid var(--slds-g-color-border-2); border-radius: 4px; padding: 1px 5px; }
  .navlist { flex: 1; overflow-y: auto; padding: 0.5rem; }
  .navlist a {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.4rem 0.5rem; border-radius: var(--slds-g-radius-border-2);
    font-size: var(--slds-g-text-body-regular); color: var(--slds-g-color-accent-1);
    text-decoration: none;
  }
  .navlist a:hover { background: var(--slds-g-color-surface-3); }
  .navlist a .sdot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
  .navlist a .sdot.built { background: var(--slds-g-color-success-1); }
  .navlist a .sdot.doc { background: var(--slds-g-color-on-surface-3); }
  .navlist .empty-nav { padding: 0.75rem 0.5rem; font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-3); }

  .main { padding: 2rem 2.25rem 5rem; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; }
  .lede { margin: 0 0 2rem; }
  .lede h2 { font-size: var(--slds-g-text-display-medium); margin: 0 0 0.5rem; letter-spacing: var(--slds-g-font-letterspacing-display); }
  .lede p { font-size: var(--slds-g-text-body-large); color: var(--slds-g-color-on-surface-2); max-width: 70ch; line-height: 1.5; }
  .lede .note { margin-top: 0.875rem; font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-3); max-width: 70ch; }
  .legend { display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }

  section.cat { margin-bottom: 2.5rem; scroll-margin-top: 1rem; }
  section.cat > h3 {
    font-size: var(--slds-g-text-heading-large); margin: 0 0 0.25rem;
    padding-bottom: 0.5rem; border-bottom: 2px solid var(--slds-g-color-border-1);
  }
  section.cat > .catdesc { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-3); margin: 0.5rem 0 1.25rem; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .entry {
    display: flex; flex-direction: column;
    border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-4);
    background: var(--slds-g-color-surface-container-1); overflow: hidden;
  }
  .entry.wide { grid-column: 1 / -1; }
  .entry header { padding: 0.75rem 0.875rem 0.625rem; border-bottom: 1px solid var(--slds-g-color-border-1); }
  .entry .nm { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .entry .nm strong { font-size: var(--slds-g-text-heading-small); }
  .entry .nm code { font-size: 11px; color: var(--slds-g-color-on-surface-3); background: var(--slds-g-color-surface-3); padding: 1px 5px; border-radius: 4px; font-family: var(--slds-g-font-family-mono); }
  .entry .desc { font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); margin: 0.375rem 0 0; line-height: 1.45; }
  .entry .demo { padding: 1rem 0.875rem; flex: 1; display: flex; align-items: center; }
  .entry .demo.block { display: block; }
  .entry .demo.empty { color: var(--slds-g-color-on-surface-3); font-size: var(--slds-g-text-body-small); }

  .pill { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 10.5px; font-weight: 700; letter-spacing: .03em; text-transform: uppercase; padding: 2px 7px; border-radius: var(--slds-g-radius-border-pill); }
  .pill.built { color: var(--slds-g-color-success-1); background: var(--slds-g-color-success-container-1); }
  .pill.doc { color: var(--slds-g-color-on-surface-2); background: var(--slds-g-color-surface-3); }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot.built { background: var(--slds-g-color-success-1); }
  .dot.doc { background: var(--slds-g-color-border-3); }
  .lg-item { display: inline-flex; align-items: center; gap: 0.4rem; font-size: var(--slds-g-text-body-small); color: var(--slds-g-color-on-surface-2); }

  /* variant showcase inside each demo */
  .vstack { display: flex; flex-direction: column; gap: 0.875rem; width: 100%; }
  .vrow { display: flex; flex-direction: column; gap: 0.4rem; }
  .vlabel { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); }
  .vdemo { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .vdemo.col { flex-direction: column; align-items: stretch; }
  .entry.wide .vstack { flex-direction: row; flex-wrap: wrap; gap: 1.25rem 2.5rem; align-items: flex-start; }
  .entry.wide .vrow { min-width: 220px; }

  /* classic Visualforce page-block scaffolding, restyled in SLDS 2 */
  .vf-block { width: 100%; border: 1px solid var(--slds-g-color-border-1); border-radius: var(--slds-g-radius-border-4); background: var(--slds-g-color-surface-container-1); box-shadow: var(--slds-g-shadow-2); overflow: hidden; }
  .vf-section-label { font-size: 10px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--slds-g-color-on-surface-3); padding-bottom: 0.5rem; margin-bottom: 0.25rem; border-bottom: 1px solid var(--slds-g-color-border-1); }
  .vf-field { display: grid; grid-template-columns: 130px 1fr; gap: 0.75rem; padding: 0.45rem 0; border-bottom: 1px solid var(--slds-g-color-border-1); align-items: baseline; }
  .vf-field .lbl { font-size: var(--slds-g-text-body-small); font-weight: var(--slds-g-font-weight-semibold); color: var(--slds-g-color-on-surface-2); text-align: right; }
  .vf-field .val { font-size: var(--slds-g-text-body-regular); color: var(--slds-g-color-on-surface-1); }
  .vf-field .val.link { color: var(--slds-g-color-accent-1); }
  .vf-foot { display: flex; gap: 8px; justify-content: center; padding: 0.625rem 1rem; border-top: 1px solid var(--slds-g-color-border-1); background: var(--slds-g-color-surface-2); }

  @keyframes vf-spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ * { animation-duration: 0.001ms !important; } }
</style>
</head>
<body>
  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="16" fill="#0176d3"/>
      <rect x="20" y="22" width="60" height="12" rx="3" fill="#fff"/>
      <rect x="20" y="40" width="60" height="38" rx="4" fill="#cfe6fb"/>
      <rect x="26" y="46" width="22" height="6" rx="2" fill="#0176d3"/>
      <rect x="26" y="58" width="48" height="5" rx="2" fill="#fff"/>
      <rect x="26" y="68" width="38" height="5" rx="2" fill="#fff"/>
    </svg>
  </template>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../_ds_bundle.js"></script>

  <script type="text/babel">
    const C = window.SalesforceSLDS2DesignSystem_2eee88;
    const {
      Button, ButtonIcon, ButtonGroup, ButtonStateful,
      Input, Select, Textarea, Slider, Combobox, Checkbox, CheckboxGroup, RadioGroup, FileUpload,
      Card, Badge, Avatar, Pill, Icon, EmptyState,
      Accordion, Tabs, Alert, Spinner,
      Breadcrumbs, ProgressBar, Datatable,
    } = C;

    /* ---------- shared layout helpers ---------- */
    function VStack({ children }) { return <div className="vstack">{children}</div>; }
    function VRow({ label, col, children }) {
      return <div className="vrow">{label && <span className="vlabel">{label}</span>}<div className={`vdemo ${col?'col':''}`}>{children}</div></div>;
    }
    function Field({ label, value, link }) {
      return <div className="vf-field"><span className="lbl">{label}</span><span className={`val ${link?'link':''}`}>{value}</span></div>;
    }

    /* ===================== PAGE STRUCTURE ===================== */
    /* apex:composition / apex:insert / apex:define — template + content page */
    function Composition() {
      return <VStack><VRow label="apex:composition over a template with apex:insert / apex:define overrides" col>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',width:'100%',maxWidth:560}}>
          <div style={{border:'1px dashed var(--slds-g-color-border-2)',borderRadius:'var(--slds-g-radius-border-3)',overflow:'hidden'}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--slds-g-color-on-surface-3)',padding:'0.4rem 0.625rem',borderBottom:'1px dashed var(--slds-g-color-border-2)'}}>Template (apex:insert)</div>
            <div style={{padding:'0.625rem',display:'flex',flexDirection:'column',gap:6}}>
              <div style={{padding:'0.4rem 0.625rem',borderRadius:6,background:'var(--slds-g-color-surface-3)',fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)'}}>insert name="header"</div>
              <div style={{padding:'0.4rem 0.625rem',borderRadius:6,background:'var(--slds-g-color-surface-3)',fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)'}}>insert name="body"</div>
            </div>
          </div>
          <div style={{border:'1px solid var(--slds-g-color-accent-1)',borderRadius:'var(--slds-g-radius-border-3)',overflow:'hidden'}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.05em',textTransform:'uppercase',color:'var(--slds-g-color-accent-1)',padding:'0.4rem 0.625rem',borderBottom:'1px solid var(--slds-g-color-border-1)'}}>Rendered (apex:define)</div>
            <div style={{padding:'0.625rem',display:'flex',flexDirection:'column',gap:6}}>
              <div style={{fontWeight:'var(--slds-g-font-weight-bold)',fontSize:'var(--slds-g-text-body-regular)'}}>Account Workspace</div>
              <div style={{fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-2)'}}>Body content supplied by the composing page.</div>
            </div>
          </div>
        </div>
      </VRow></VStack>;
    }
    /* apex:image */
    function ImageVF() {
      return <VStack><VRow label="apex:image — a static-resource or URL image" col>
        <div style={{width:200,height:120,borderRadius:'var(--slds-g-radius-border-3)',border:'1px solid var(--slds-g-color-border-1)',background:'repeating-linear-gradient(135deg, var(--slds-g-color-surface-2) 0 10px, var(--slds-g-color-surface-3) 10px 20px)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontFamily:'var(--slds-g-font-family-mono,monospace)',fontSize:11,color:'var(--slds-g-color-on-surface-3)'}}>logo.png</span>
        </div>
      </VRow></VStack>;
    }

    /* ===================== PAGE BLOCKS ===================== */
    /* apex:pageBlock — the signature Visualforce detail layout */
    function PageBlock() {
      return <VStack><VRow label="Detail page block — title bar, section, two-column field grid & footer buttons" col>
        <div className="vf-block" style={{maxWidth:640}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'0.75rem 1rem',borderBottom:'1px solid var(--slds-g-color-border-1)'}}>
            <Icon iconName="standard:account" size="small" />
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)'}}>Account</div>
              <div style={{fontSize:'var(--slds-g-text-heading-small)',fontWeight:'var(--slds-g-font-weight-bold)'}}>Acme Corporation</div>
            </div>
            <Button variant="neutral" size="small" label="Edit" />
            <Button variant="neutral" size="small" label="Delete" />
          </div>
          <div style={{padding:'0.875rem 1rem 0.25rem'}}>
            <div className="vf-section-label">Account Information</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 2rem'}}>
              <Field label="Account Name" value="Acme Corporation" link />
              <Field label="Owner" value="Austin Guevara" link />
              <Field label="Phone" value="(415) 555-0132" />
              <Field label="Type" value="Customer — Direct" />
              <Field label="Industry" value="Technology" />
              <Field label="Annual Revenue" value="$48,000,000" />
            </div>
          </div>
          <div className="vf-foot">
            <Button variant="brand" size="small" label="Save" />
            <Button variant="neutral" size="small" label="Save & New" />
            <Button variant="neutral" size="small" label="Cancel" />
          </div>
        </div>
      </VRow></VStack>;
    }
    /* apex:pageBlockSection — collapsible sections with column count */
    function PageBlockSection() {
      const [open,setOpen]=React.useState({a:true,b:true});
      const Sec=({id,title,children})=> <div style={{border:'1px solid var(--slds-g-color-border-1)',borderRadius:'var(--slds-g-radius-border-3)',overflow:'hidden'}}>
        <button onClick={()=>setOpen(o=>({...o,[id]:!o[id]}))} style={{display:'flex',alignItems:'center',gap:6,width:'100%',textAlign:'left',padding:'0.5rem 0.75rem',background:'var(--slds-g-color-surface-2)',border:0,borderBottom:open[id]?'1px solid var(--slds-g-color-border-1)':'0',cursor:'pointer',font:'inherit',fontSize:'var(--slds-g-text-body-small)',fontWeight:'var(--slds-g-font-weight-bold)',color:'var(--slds-g-color-on-surface-1)'}}>
          <Icon iconName={open[id]?'utility:chevrondown':'utility:chevronright'} size="xx-small" style={{color:'var(--slds-g-color-on-surface-2)'}} />{title}
        </button>
        {open[id] && <div style={{padding:'0.625rem 0.75rem'}}>{children}</div>}
      </div>;
      return <VStack><VRow label="Collapsible sections (columns=2) inside a page block" col>
        <div style={{maxWidth:560,display:'flex',flexDirection:'column',gap:10}}>
          <Sec id="a" title="Address Information">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 2rem'}}>
              <Field label="Billing City" value="San Francisco" />
              <Field label="Billing State" value="CA" />
              <Field label="Country" value="United States" />
              <Field label="Postal Code" value="94105" />
            </div>
          </Sec>
          <Sec id="b" title="System Information">
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 2rem'}}>
              <Field label="Created By" value="Austin Guevara" link />
              <Field label="Last Modified" value="2 hours ago" />
            </div>
          </Sec>
        </div>
      </VRow></VStack>;
    }
    /* apex:sectionHeader */
    function SectionHeader() {
      return <VStack><VRow label="Page title + subtitle bar above the content" col>
        <div style={{maxWidth:520,display:'flex',alignItems:'center',gap:12,padding:'0.625rem 0.875rem',borderRadius:'var(--slds-g-radius-border-3)',background:'var(--slds-g-color-surface-2)',border:'1px solid var(--slds-g-color-border-1)'}}>
          <Icon iconName="standard:contact" size="small" />
          <div>
            <div style={{fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)'}}>Contact</div>
            <div style={{fontSize:'var(--slds-g-text-heading-small)',fontWeight:'var(--slds-g-font-weight-bold)'}}>Lando Voss</div>
          </div>
        </div>
      </VRow></VStack>;
    }
    /* apex:detail — standard record detail (highlights + related actions) */
    function Detail() {
      return <VStack><VRow label="Standard record detail — highlights panel with key fields & actions" col>
        <div className="vf-block" style={{maxWidth:640}}>
          <div style={{display:'flex',alignItems:'center',gap:12,padding:'0.875rem 1rem',borderBottom:'1px solid var(--slds-g-color-border-1)'}}>
            <Icon iconName="standard:opportunity" size="medium" />
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)'}}>Opportunity</div>
              <div style={{fontSize:'var(--slds-g-text-heading-medium)',fontWeight:'var(--slds-g-font-weight-bold)'}}>Global Media — Renewal</div>
            </div>
            <Button variant="neutral" size="small" label="Edit" />
            <Button variant="brand" size="small" label="Follow" />
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:'0.75rem 1.25rem',padding:'0.875rem 1rem'}}>
            {[['Amount','$240,000'],['Close Date','Apr 30, 2026'],['Stage','Negotiation'],['Owner','Austin Guevara']].map(([l,v])=>
              <div key={l}><div style={{fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)',marginBottom:2}}>{l}</div><div style={{fontSize:'var(--slds-g-text-body-regular)',fontWeight:'var(--slds-g-font-weight-semibold)'}}>{v}</div></div>
            )}
          </div>
        </div>
      </VRow></VStack>;
    }

    /* ===================== INPUT ===================== */
    function InputGeneric() {
      return <VStack><VRow label="apex:input — HTML5 type-aware input, usable without an SObject binding" col>
        <div style={{maxWidth:420,display:'flex',flexDirection:'column',gap:'0.75rem'}}>
          <Input label="Email (type=email)" type="email" defaultValue="lando@globalmedia.example" />
          <Input label="Close Date (type=date)" type="date" defaultValue="2026-04-30" />
          <Input label="Quantity (type=number)" type="number" defaultValue="12" />
        </div>
      </VRow></VStack>;
    }
    function InlineEdit() {
      const [editing,setEditing]=React.useState(false);
      const [val,setVal]=React.useState('Acme Corporation');
      const [draft,setDraft]=React.useState(val);
      return <VStack><VRow label="apex:inlineEditSupport — click a read-only field to edit it in place" col>
        <div style={{maxWidth:360}}>
          {!editing ? (
            <div onClick={()=>{setDraft(val);setEditing(true);}} style={{display:'flex',alignItems:'center',gap:8,padding:'0.4rem 0.5rem',borderRadius:'var(--slds-g-radius-border-2)',cursor:'pointer',border:'1px solid var(--slds-g-color-border-2)'}}>
              <span style={{flex:1,fontSize:'var(--slds-g-text-body-regular)'}}>{val}</span>
              <ButtonIcon iconName="utility:edit" variant="bare" size="small" title="Edit" />
            </div>
          ) : (
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{flex:1}}><Input value={draft} onChange={e=>setDraft(e.target.value)} autoFocus /></div>
              <ButtonIcon iconName="utility:check" variant="brand" size="small" title="Save" onClick={()=>{setVal(draft);setEditing(false);}} />
              <ButtonIcon iconName="utility:close" variant="border" size="small" title="Cancel" onClick={()=>setEditing(false)} />
            </div>
          )}
        </div>
      </VRow></VStack>;
    }
    function InputField() {
      return <VStack><VRow label="Bound, type-aware edit fields rendered from the SObject schema" col>
        <div style={{maxWidth:420,display:'flex',flexDirection:'column',gap:'0.75rem'}}>
          <Input label="Account Name" defaultValue="Acme Corporation" required />

                <div><div style={{fontSize:'var(--slds-g-text-body-regular)',fontWeight:'var(--slds-g-font-weight-semibold)'}}>{n}</div><div style={{fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)'}}>{c}</div></div>
              </div>
            )}
          </div>
        </div>
      </VRow></VStack>;
    }
    function Vote() {
      const [v,setV]=React.useState(0);
      const [count,setCount]=React.useState(18);
      const set=(dir)=>{ setCount(c=>c - (v||0) + dir); setV(dir); };
      return <VStack><VRow label="apex:vote — up/down voting on a knowledge article" col>
        <div style={{display:'inline-flex',alignItems:'center',gap:10,padding:'0.5rem 0.75rem',borderRadius:'var(--slds-g-radius-border-pill)',border:'1px solid var(--slds-g-color-border-2)',background:'var(--slds-g-color-surface-container-1)'}}>
          <ButtonIcon iconName="utility:like" variant={v===1?'brand':'border'} size="small" title="Helpful" onClick={()=>set(v===1?0:1)} />
          <span style={{fontSize:'var(--slds-g-text-body-regular)',fontWeight:'var(--slds-g-font-weight-bold)',minWidth:20,textAlign:'center'}}>{count}</span>
          <ButtonIcon iconName="utility:dislike" variant={v===-1?'brand':'border'} size="small" title="Not helpful" onClick={()=>set(v===-1?0:-1)} />
        </div>
      </VRow></VStack>;
    }

    /* ===================== CHATTER & SOCIAL ===================== */
    function ChatterFeed() {
      const posts=[
        {who:'Austin Guevara',init:'AG',when:'2h',text:'Closed the Global Media renewal — $240K. Great teamwork on the pricing.',likes:6,comments:2},
        {who:'Lando Voss',init:'LV',when:'5h',text:'Uploaded the Q3 territory plan to the account.',likes:3,comments:0},
      ];
      return <VStack><VRow label="chatter:feed — record feed with posts, likes & comments" col>
        <div style={{maxWidth:560,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
            <Avatar initials="AG" size="small" />
            <Textarea rows={2} placeholder="Share an update…" />
          </div>
          {posts.map((p,i)=>
            <div key={i} style={{display:'flex',gap:10,padding:'0.75rem',border:'1px solid var(--slds-g-color-border-1)',borderRadius:'var(--slds-g-radius-border-3)',background:'var(--slds-g-color-surface-container-1)'}}>
              <Avatar initials={p.init} size="small" />
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'baseline',gap:6}}><strong style={{fontSize:'var(--slds-g-text-body-regular)'}}>{p.who}</strong><span style={{fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-3)'}}>· {p.when}</span></div>
                <p style={{margin:'0.25rem 0 0.5rem',fontSize:'var(--slds-g-text-body-regular)',color:'var(--slds-g-color-on-surface-1)',lineHeight:1.45}}>{p.text}</p>
                <div style={{display:'flex',gap:16,fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-2)'}}>
                  <span style={{display:'inline-flex',alignItems:'center',gap:4}}><Icon iconName="utility:like" size="xx-small" /> {p.likes}</span>
                  <span style={{display:'inline-flex',alignItems:'center',gap:4}}><Icon iconName="utility:comments" size="xx-small" /> {p.comments}</span>
                </div>
              </div>
            </div>
          )}
        </div>
      </VRow></VStack>;
    }
    function ChatterFollow() {
      return <VRow label="chatter:follow — follow / unfollow a record"><ButtonStateful labelWhenOff="Follow" labelWhenOn="Following" labelWhenHover="Unfollow" /></VRow>;
    }
    function ChatterFollowers() {
      const f=['AG','LV','MO','DP','RS'];
      return <VStack><VRow label="chatter:followers — who follows this record" col>
        <div style={{display:'flex',alignItems:'center'}}>
          {f.map((x,i)=><span key={i} style={{marginLeft:i?-8:0,borderRadius:'50%',boxShadow:'0 0 0 2px var(--slds-g-color-surface-container-1)'}}><Avatar initials={x} size="small" /></span>)}
          <span style={{marginLeft:10,fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-2)'}}>5 followers</span>
        </div>
      </VRow></VStack>;
    }
    function ChatterNewStatus() {
      return <VStack><VRow label="chatter:newStatus — post a new update" col>
        <div style={{maxWidth:480,display:'flex',flexDirection:'column',gap:8}}>
          <Textarea rows={2} placeholder="What are you working on?" />
          <div style={{display:'flex',justifyContent:'flex-end'}}><Button variant="brand" size="small" label="Share" /></div>
        </div>
      </VRow></VStack>;
    }

    /* ---- live example registry ---- */
    const Ex = {
      Composition, ImageVF,
      PageBlock, PageBlockSection, SectionHeader, Detail,
      InputGeneric, InlineEdit, InputField, InputText, InputTextarea, InputCheckbox, InputSecret, InputFile,

      CommandButton, CommandLink, ActionStatus, ActionPoller,
      PageBlockTable, DataTableVF, Repeat, DataList, RelatedList,
      PageMessages, PageMessage, FieldMessage,
      TabPanel, PanelBar, PanelGrid, Toolbar,
      ChartBar, ChartLine, ChartPie, ChartGauge, ChartScatter, ChartArea, AxisChart,
      ActionFunction, ActionSupport, ActionRegion, CanvasApp,

      CaseFeed, ClickToDial, LogCallPublisher, KnowledgeList, EmailPublisher,
      ReportChart, WaveDashboard,

      ChatterFeed, ChatterFollow, ChatterFollowers, ChatterNewStatus,
    };

    /* ---- catalog data (Visualforce apex: standard component reference) ---- */

    const CAT = [
      { id:'structure', title:'Page Structure', desc:'Components that define a page and assemble it from templates and resources.', items:[
        ['Page','apex:page','doc','The root container. Binds a standardController/extensions, and toggles sidebar, header, and SLDS styling.',null],
        ['Composition','apex:composition','built','References a template page; apex:define fills the named apex:insert holes the template declares.','Composition'],
        ['Define','apex:define','doc','Inside a composition, supplies content for a named insert in the referenced template.',null],

        ['Page Block Buttons','apex:pageBlockButtons','doc','The button row (top/bottom) of a page block — typically Save / Cancel.',null],

      ]},
      { id:'input', title:'Input', desc:'Form and field components that capture and validate user data.', items:[

        ['Inline Edit Support','apex:inlineEditSupport','built','Adds click-to-edit inline editing to a field, table, or related list.','InlineEdit'],

        ['Input Hidden','apex:inputHidden','doc','A hidden form value posted with the form.',null],
        ['Select List','apex:selectList','built','A single- or multi-select dropdown populated by selectOptions.','SelectList'],
        ['Select Checkboxes','apex:selectCheckboxes','built','A multi-select group rendered as checkboxes.','SelectCheckboxes'],
        ['Select Radio','apex:selectRadio','built','A single-select group rendered as radio buttons.','SelectRadio'],
        ['Select Option(s)','apex:selectOption','doc','Supplies the items for a select control — one option or a bound collection (selectOptions).',null],

      { id:'output', title:'Output', desc:'Components that display bound, formatted, read-only values.', items:[

      { id:'actions', title:'Buttons & Actions', desc:'Components that invoke controller actions, including partial-page AJAX.', items:[

      { id:'data', title:'Data Tables & Iteration', desc:'Components that render collections as tables, related lists, or repeated markup.', items:[

        ['List Views','apex:listViews','doc','Renders the standard list-view picker and grid for an object.',null],
        ['Enhanced List','apex:enhancedList','doc','The interactive enhanced list view with inline editing & pagination.',null],
      ]},
      { id:'messages', title:'Messages', desc:'Components that surface validation and status messages.', items:[
        ['Page Messages','apex:pageMessages','built','Displays all page-level messages (errors, warnings, confirmations, info).','PageMessages'],
        ['Page Message','apex:pageMessage','built','Displays a single custom message with a chosen severity.','PageMessage'],
        ['Messages','apex:messages','doc','Displays all messages as a plain list (unstyled).',null],
        ['Message','apex:message','built','Displays a single field-level error next to its input.','FieldMessage'],
      ]},
      { id:'panels', title:'Panels & Tabs', desc:'Components that group and switch between regions of a page.', items:[
        ['Tab Panel','apex:tabPanel','built','A set of switchable tabs (apex:tab children).','TabPanel'],
        ['Tab','apex:tab','doc','A single tab pane inside a tab panel.',null],
        ['Panel Bar','apex:panelBar','built','A vertical accordion of expandable items (apex:panelBarItem).','PanelBar'],

        ['Panel Group','apex:panelGroup','doc','Groups components inside a panelGrid cell.',null],
        ['Toolbar','apex:toolbar','built','A horizontal action bar with left/right-aligned toolbar groups.','Toolbar'],
      ]},
      { id:'charting', title:'Charting', desc:'Visualforce Charting — render data-driven charts on the page.', items:[
        ['Chart','apex:chart','built','The chart canvas that hosts one or more data series.','ChartBar'],
        ['Bar Series','apex:barSeries','built','Renders bars/columns for a numeric series.','ChartBar'],
        ['Line Series','apex:lineSeries','built','Renders a trend line, optionally with a filled area.','ChartLine'],
        ['Pie Series','apex:pieSeries','built','Renders a pie / donut from a single series.','ChartPie'],
        ['Gauge Series','apex:gaugeSeries','built','Renders a single-value gauge (e.g. quota attainment).','ChartGauge'],
        ['Scatter Series','apex:scatterSeries','built','Plots discrete points against two numeric axes.','ChartScatter'],
        ['Area Series','apex:areaSeries','built','Renders a filled area for one or more numeric series.','ChartArea'],
        ['Radar Series','apex:radarSeries','doc','Plots a series on a radial (radar) chart.',null],
        ['Axis','apex:axis','built','Configures a chart axis (type, fields, title, grid).','AxisChart'],
        ['Legend','apex:legend','doc','Renders the chart legend at a given position.',null],
        ['Chart Label','apex:chartLabel','doc','Displays value labels on the data points of a series.',null],
        ['Chart Tips','apex:chartTips','doc','Adds hover tooltips to a chart series.',null],
      ]},
      { id:'components', title:'Components & Utilities', desc:'Reusable custom components, page variables, and dynamic markup.', items:[
        ['Variable','apex:variable','doc','Declares a local variable for use within the page (often inside apex:repeat).',null],
        ['Attribute','apex:attribute','doc','Declares an attribute on a custom apex:component.',null],
        ['Component','apex:component','doc','Defines a reusable custom Visualforce component.',null],
        ['Component Body','apex:componentBody','doc','Renders the body passed into a custom component.',null],
        ['Dynamic Component','apex:dynamicComponent','doc','Renders a component built in Apex at runtime.',null],
        ['Include Lightning','apex:includeLightning','doc','Loads Lightning Components for use inside a Visualforce page.',null],
        ['Canvas App','apex:canvasApp','built','Embeds a Canvas (third-party) app on the page.','CanvasApp'],
        ['Milestone Tracker','apex:milestoneTracker','built','Displays entitlement milestone progress for a case.','MilestoneTracker'],
        ['Remote Objects','apex:remoteObjects','doc','Declares SObjects (with remoteObjectModel / remoteObjectField) for JavaScript DML without Apex.',null],
        ['SControl','apex:scontrol','doc','Embeds a legacy s-control (deprecated).',null],
        ['Map','apex:map','built','An interactive map centered on a location.','MapVF'],
        ['Map Marker','apex:mapMarker','doc','A pin placed on an apex:map at a given address or coordinate.',null],
        ['Map Info Window','apex:mapInfoWindow','doc','An info popup shown when a map marker is selected.',null],
        ['Vote','apex:vote','built','Up/down voting control for a knowledge article.','Vote'],
      ]},
      { id:'email', title:'Email Templates', desc:'The messaging: namespace for building HTML and text Visualforce email templates.', items:[

        ['HTML Email Body','messaging:htmlEmailBody','doc','The HTML body content of an email template.',null],
        ['Plain Text Email Body','messaging:plainTextEmailBody','doc','The plain-text body of an email template.',null],
        ['Attachment','messaging:attachment','doc','Attaches a file (e.g. a rendered PDF) to the email.',null],
        ['Email Header','messaging:emailHeader','doc','Adds a custom header to the outgoing email.',null],
    ]},
      { id:'service', title:'Service & Knowledge', desc:'Service Console, knowledge, and live-agent components for support experiences.', items:[
        ['Email Publisher','apex:emailPublisher','built','The case-feed email composer for replying to a customer.','EmailPublisher'],
        ['Log Call Publisher','apex:logCallPublisher','built','The case-feed composer for logging a call against the case.','LogCallPublisher'],
        ['Click To Dial','support:clickToDial','built','A CTI-enabled phone number that dials through the softphone.','ClickToDial'],
        ['Portal Publisher','support:portalPublisher','doc','A publisher for posting customer-facing answers to a case.',null],
        ['Case Articles','support:caseArticles','doc','Knowledge articles attached to or suggested for a case.',null],
        ['Article List','knowledge:articleList','built','Lists knowledge articles for a data category or search.','KnowledgeList'],

        ['Client Chat','liveAgent:clientChat','doc','The Live Agent / chat window components for an embedded chat.',null],
    ]},
      { id:'analytics', title:'Analytics', desc:'Embed saved report charts and CRM Analytics dashboards directly on a page.', items:[

        ['Wave Dashboard','wave:dashboard','built','Embeds a CRM Analytics (Wave) dashboard, optionally filtered.','WaveDashboard'],
    ]},
      { id:'social', title:'Chatter & Social', desc:'Chatter feed, follow, and status components for collaboration.', items:[
        ['Chatter Feed','chatter:feed','built','The record/user feed — posts, comments, and likes.','ChatterFeed'],
        ['Follow','chatter:follow','built','A follow / unfollow toggle for a record.','ChatterFollow'],
        ['Followers','chatter:followers','built','Displays who is following a record.','ChatterFollowers'],
        ['New Status','chatter:newStatus','built','A composer for posting a new status update.','ChatterNewStatus'],
        ['Feed With Followers','chatter:feedWithFollowers','doc','A combined feed plus followers list in one component.',null],

    ];

    const slug = s => 'c-'+String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

    function Entry({ row }) {
      const [name, tag, status, desc, exKey] = row;
      const wide = exKey && WIDE.has(exKey);
      let demo;
      if (status === 'built' && exKey && Ex[exKey]) {
        const Comp = Ex[exKey];
        demo = <div className="demo block"><Comp /></div>;
      } else {
        demo = <div className="demo empty">Documented — see description.</div>;
      }
      return (
        <div className={`entry ${wide?'wide':''}`} id={slug(name)} style={{scrollMarginTop:'1rem'}}>
          <header>
            <div className="nm">
              <span className={`dot ${status}`}></span>
              <strong>{name}</strong>
              <code>{tag}</code>
              <span style={{flex:1}}></span>
              <span className={`pill ${status}`}>{status === 'built' ? 'In this kit' : 'Documented'}</span>
            </div>
            <p className="desc">{desc}</p>
          </header>
          {demo}
        </div>
      );
    }

    function App() {
      const builtAll = CAT.reduce((s,c)=>s+c.items.filter(i=>i[2]==='built').length,0);
      const totalAll = CAT.reduce((s,c)=>s+c.items.length,0);
      const allItems = React.useMemo(()=>CAT.flatMap(c=>c.items.map(i=>({name:i[0],tag:i[1],status:i[2]}))).sort((a,b)=>a.name.localeCompare(b.name)),[]);
      const [q,setQ]=React.useState('');
      const searchRef=React.useRef(null);
      React.useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='j'){e.preventDefault();searchRef.current&&searchRef.current.focus();}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
      const ql=q.trim().toLowerCase();
      const matches=ql?allItems.filter(i=>i.name.toLowerCase().includes(ql)||i.tag.toLowerCase().includes(ql)):allItems;
      return (
        <>
          <aside className="side">
            <div className="side-head">
              <div className="eyebrow"><span className="material-symbols-rounded" style={{fontSize:18}}>arrow_back</span><span className="material-symbols-rounded bolt">bolt</span><span>Platform</span></div>
              <h1>Visualforce Component Reference</h1>
              <div className="search">
                <span className="material-symbols-rounded" style={{fontSize:18,color:'var(--slds-g-color-on-surface-3)'}}>search</span>
                <input ref={searchRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search apex: tags" aria-label="Search components" />
                <span className="kbd">⌘J</span>
              </div>
            </div>
            <nav className="navlist">
              {matches.length ? matches.map(i => (
                <a key={i.name} href={`#${slug(i.name)}`}>
                  <span className={`sdot ${i.status}`}></span>
                  <span>{i.name}</span>
                </a>
              )) : <div className="empty-nav">No components match “{q}”.</div>}
            </nav>
          </aside>
          <main className="main">
            <div className="lede">
              <h2>Visualforce Component Reference</h2>
              <p>The Visualforce <code style={{fontFamily:'var(--slds-g-font-family-mono)',fontSize:'0.9em'}}>apex:</code> standard component set, organized by what each tag does. The visually distinct tags — page blocks, forms, actions, charts, and Chatter — render live below in SLDS 2; markup-only and runtime tags are documented.</p>
              <p className="note">Visualforce pages render in Salesforce Classic styling by default; with <code style={{fontFamily:'var(--slds-g-font-family-mono)',fontSize:'0.9em'}}>&lt;apex:page&gt;</code> applying the SLDS scoping class (or <code style={{fontFamily:'var(--slds-g-font-family-mono)',fontSize:'0.9em'}}>lightningStylesheets="true"</code>) they pick up the Lightning look shown here.</p>
              <div className="legend">
                <span className="lg-item"><span className="dot built"></span> Live SLDS 2 demo ({builtAll}/{totalAll})</span>
                <span className="lg-item"><span className="dot doc"></span> Documented — markup-only or runtime tag</span>
              </div>
            </div>
            {CAT.map(c => (
              <section key={c.id} id={c.id} className="cat">
                <h3>{c.title}</h3>
                <p className="catdesc">{c.desc}</p>
                <div className="grid">
                  {c.items.map((row,i) => <Entry key={i} row={row} />)}
                </div>
              </section>
            ))}
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
