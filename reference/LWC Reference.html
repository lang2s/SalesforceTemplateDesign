    /* lightning-flow — screen flow interview runner with Back / Next / Pause / Finish + status */
    function FlowDemo() {
      const screens=[

      ];

          </div>

        </div>
      </VRow></VStack>;

    function TreeGrid() {
      const [expanded,setExpanded]=React.useState(new Set(['1','1a']));

    function DI({ type, option }) {

    /* lightning-relative-date-time — "2 hours ago" style relative time */
    function relTime(ms){ const d=(ms-Date.now())/1000; const abs=Math.abs(d); const f=(n,u)=>{const r=Math.round(n);return new Intl.RelativeTimeFormat('en',{numeric:'auto'}).format(d<0?-r:r,u);};
      if(abs<60) return f(abs,'second'); if(abs<3600) return f(abs/60,'minute'); if(abs<86400) return f(abs/3600,'hour'); if(abs<2592000) return f(abs/86400,'day'); if(abs<31536000) return f(abs/2592000,'month'); return f(abs/31536000,'year'); }
    function RelativeDateTime() {
      const now=Date.now();
      const rows=[['2 minutes ago',now-120000],['3 hours ago',now-3*3600000],['Yesterday',now-26*3600000],['Last week',now-8*86400000],['In 3 days',now+3*86400000],['Next month',now+40*86400000]];

      Datatable: () => { const [s,setS]=React.useState({by:'amount',dir:'desc'}); const rows=[{id:'1',name:'Global Media — Renewal',amount:240000,stage:'Negotiation'},{id:'2',name:'Acme — Expansion',amount:410000,stage:'Proposal'},{id:'3',name:'Pinnacle — Service',amount:88000,stage:'Qualification'}].sort((a,b)=>s.dir==='asc'?a[s.by]-b[s.by]:b[s.by]-a[s.by]); return <Datatable selectable sortBy={s.by} sortDir={s.dir} onSort={(by,dir)=>setS({by,dir})} columns={[{key:'name',label:'Opportunity',sortable:true},{key:'amount',label:'Amount',align:'right',sortable:true,render:(v)=>'$'+v.toLocaleString()},{key:'stage',label:'Stage',render:(v)=><Badge variant="brand" label={v} />}]} rows={rows} rowActions={()=> <ButtonIcon iconName="utility:threedots_vertical" variant="bare" size="small" title="Actions" />} />; },
      Tree: () => <VStack><VRow label="Nested hierarchy with folder icons (expand / collapse)" col><Tree nodes={[{id:'w',label:'West',iconName:'utility:folder_open',children:[{id:'ca',label:'California',children:[{id:'sf',label:'San Francisco'},{id:'la',label:'Los Angeles'}]},{id:'or',label:'Oregon'}]},{id:'e',label:'East',iconName:'utility:folder_open',children:[{id:'ny',label:'New York'},{id:'ma',label:'Massachusetts'}]}]} /></VRow></VStack>,
    };

    function Panel({ c, t }) {
      return <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:c,fontWeight:600,color:'var(--slds-g-color-on-surface-1)'}}>{t}</div>;
    }
    function Box({ children }) {
      return <div style={{padding:'0.5rem',textAlign:'center',background:'var(--slds-g-color-surface-3)',borderRadius:'var(--slds-g-radius-border-2)',fontSize:'var(--slds-g-text-body-small)',color:'var(--slds-g-color-on-surface-2)'}}>{children}</div>;
    }
    function VStack({ children }) { return <div className="vstack">{children}</div>; }
    function VRow({ label, col, children }) {
      return <div className="vrow">{label && <span className="vlabel">{label}</span>}<div className={`vdemo ${col?'col':''}`}>{children}</div></div>;
    }

    /* ---- catalog data (full lightning base-component catalog) ---- */
    const WIDE = new Set(['DualListbox','Carousel','Layout','ProgressIndicator','VerticalNavigation','Datatable','Tree','Modal','Alert','Button','ButtonIcon','Input','Avatar','Icon','Toast','ProgressBar','Spinner','Tabs','Accordion','Select','ButtonMenu','EmptyState','Card','Slider','FileUpload','Combobox','CheckboxGroup','RadioGroup','Textarea','BarcodeScanner','ButtonIconStateful','Flow','TreeGrid','QuickActionPanel','DynamicIcon','Illustration','Map','PillContainer','InputRichText','RecordPicker','RecordForm','RecordEditForm','RecordViewForm','Confirm','Prompt','ToastContainer','Tile','DynamicListContainer','InputAddress','OmniScript','PubSub']);
    const CAT = [
      { id:'actions', title:'Actions & Menus', desc:'Components that trigger an action when clicked.', items:[
        ['Button','lightning-button','built','The primary clickable action. Variants: brand, neutral, outline-brand, destructive, success, text.','Button'],
        ['Button Group','lightning-button-group','built','Joins related buttons into a segmented control / view switcher.','ButtonGroup'],
        ['Button Icon','lightning-button-icon','built','Icon-only button. Variants: border, border-filled, bare, brand, container.','ButtonIcon'],
        ['Button Icon Stateful','lightning-button-icon-stateful','built','A toggling icon-only button (like/dislike). Variants: border, border-filled, border-inverse; 4 sizes; selected state.','ButtonIconStateful'],
        ['Button Menu','lightning-button-menu','built','A button opening a dropdown of items, dividers & subheaders (incl. Menu Item / Divider / Subheader).','ButtonMenu'],
        ['Button Stateful','lightning-button-stateful','built','Toggle button with hover affordance (Follow / Following / Unfollow).','ButtonStateful'],
        ['Click To Dial','lightning-click-to-dial','built','A formatted phone number rendered as a click-to-dial link (Open CTI / Voice) or plain text when disabled.','ClickToDial'],
        ['Flow','lightning-flow','built','A screen flow interview runner with Back / Next / Pause / Finish navigation and status (started, paused, finished).','Flow'],
      ]},
      { id:'containers', title:'Containers', desc:'Components that group related content.', items:[
        ['Accordion','lightning-accordion','built','Stacked expand/collapse sections (incl. Accordion Section).','Accordion'],
        ['Card','lightning-card','built','A titled surface with optional icon, header actions, body & footer.','Card'],
        ['Carousel','lightning-carousel','built','A sliding panel with indicator dots & arrows (incl. Carousel Image).','Carousel'],
        ['Layout','lightning-layout','built','A responsive 12-column flex grid (Layout + Layout Item).','Layout'],
        ['Modal','lightning-modal','built','A focused dialog over a dimmed backdrop (Modal Header / Body / Footer slots).','Modal'],
        ['Quick Action Panel','lightning-quick-action-panel','built','A record quick-action modal (header + body + footer slot). Footer-slot form & record-form style.','QuickActionPanel'],
        ['Tab Set','lightning-tabset','built','Underlined, scoped, and vertical tab types for switching views (Tab Set + Tab).','Tabs'],
        ['Tile','lightning-tile','built','A compact record summary for related lists & side panels.','Tile'],
      ]},
      { id:'visuals', title:'Images & Visuals', desc:'Components that display images, icons, and visual elements.', items:[
        ['Avatar','lightning-avatar','built','User/object avatar: photo, initials, or icon; circle or square.','Avatar'],
        ['Badge','lightning-badge','built','A small status label. Variants: default, brand, success, warning, error.','Badge'],
        ['Dynamic Icon','lightning-dynamic-icon','built','Animated state icons: ellie, eq, score, strength, trend & waffle (hover).','DynamicIcon'],
        ['Empty State','lightning-empty-state','built','Centered icon + message + action for no-data / no-results states.','EmptyState'],
        ['Helptext','lightning-helptext','built','A small info icon revealing a tooltip on hover/focus.','Helptext'],
        ['Icon','lightning-icon','built','SLDS icon by name (utility / standard / action / doctype / custom).','Icon'],
        ['Illustration','lightning-illustration','built','Empty-state SVG illustration (set:symbol), icon only — supporting text lives in adjacent UI.','Illustration'],
        ['Map','lightning-map','built','A map with location markers and an optional selectable location list.','Map'],
        ['Pill','lightning-pill','built','A removable token/chip with optional icon or avatar.','Pill'],
        ['Pill Container','lightning-pill-container','built','A wrapping group of Pills with a heading & overflow (bordered or bare).','PillContainer'],
      ]},
      { id:'input', title:'Input', desc:'Components that let users enter and validate data.', items:[
        ['Checkbox Group','lightning-checkbox-group','built','A labeled set of related checkboxes (multi-select).','CheckboxGroup'],
        ['Combobox','lightning-combobox','built','A styled single-select dropdown with checkmark.','Combobox'],
        ['Dual Listbox','lightning-dual-listbox','built','Move options between Available and Selected lists.','DualListbox'],
        ['File Upload','lightning-file-upload','built','A dashed drop zone + browse link listing selected files.','FileUpload'],
        ['Input','lightning-input','built','Text/email/number/etc input with icon, required & error states. Also Checkbox & Toggle below.','Input'],
        ['Input Address','lightning-input-address','built','A compound address field — street, city, province, postal code & country.','InputAddress'],
        ['Input Location','lightning-input-location','built','A compound geolocation field — latitude & longitude.','InputLocation'],
        ['Input Name','lightning-input-name','built','A compound name field — salutation, first, middle, last & suffix.','InputName'],
        ['Checkbox Button','lightning-input (checkbox-button)','built','A checkbox styled as a toggle button; multi-select toolbar.','CheckboxButton'],
        ['Input Rich Text','lightning-input-rich-text','built','A WYSIWYG editor: font/size, bold/italic/underline/strike, lists, align, link & clean. Toolbar top or bottom.','InputRichText'],
        ['Radio Group','lightning-radio-group','built','A labeled set of mutually-exclusive radio options.','RadioGroup'],
        ['Record Picker','lightning-record-picker','built','An autocomplete lookup combobox over records — search, select & clear; contains / startsWith matching.','RecordPicker'],
        ['Select','lightning-select','built','A native dropdown styled to match SLDS inputs.','Select'],
        ['Slider','lightning-slider','built','A range input with brand-filled track and value label.','Slider'],
        ['Text Area','lightning-textarea','built','A multi-line text input.','Textarea'],
        ['Checkbox','lightning-input (checkbox)','built','A single checkbox toggle.','Checkbox'],
        ['Toggle','lightning-input (toggle)','built','An on/off switch.','Toggle'],
      ]},
      { id:'forms', title:'Forms (Record data-binding)', desc:'Create / edit / view records bound to a Salesforce org — mocked here over a sample Account.', items:[
        ['Record Form','lightning-record-form','built','Auto-renders a record’s fields with a view ↔ edit toggle.','RecordForm'],
        ['Record Edit Form','lightning-record-edit-form','built','Editable record form built from Input Fields + Save / Cancel.','RecordEditForm'],
        ['Input Field','lightning-input-field','built','A single bound, type-aware edit field (text, picklist, currency).','InputField'],
        ['Record View Form','lightning-record-view-form','built','Read-only record form built from Output Fields.','RecordViewForm'],
        ['Output Field','lightning-output-field','built','A single bound, formatted read-only field (text, phone, url, currency).','OutputField'],
      ]},
      { id:'navigation', title:'Navigation', desc:'Components that help users move between pages.', items:[
        ['Breadcrumbs','lightning-breadcrumbs','built','A hierarchy trail above records & lists (Breadcrumbs + Breadcrumb).','Breadcrumbs'],
        ['Vertical Navigation','lightning-vertical-navigation','built','Sidebar nav in default, shaded & compact types — sections, icons & count badges.','VerticalNavigation'],
      ]},
      { id:'notifications', title:'Notifications', desc:'Status & notification components that deliver information.', items:[
        ['Alert','lightning-alert','built','A persistent, full-width notification bar. Variants: info, success, warning, error.','Alert'],
        ['Confirm','lightning-confirm','built','A yes/no confirmation dialog (SLDS prompt blueprint). Also shows the alert prompt; theme & headerless variants.','Confirm'],
        ['Prompt','lightning-prompt','built','A single-input dialog (SLDS prompt blueprint) that returns the entered value.','Prompt'],
        ['Toast','lightning-toast','built','A transient confirmation/alert banner.','Toast'],
        ['Toast Container','lightning-toast-container','built','The corner queue that stacks transient Toasts and auto-dismisses them.','ToastContainer'],
        ['Platform Show Toast Event','lightning-platform-show-toast-event','doc','The Aura/LWC event that fires a Toast. Call your own toast trigger in a mock.',null],
      ]},
      { id:'output', title:'Output (Formatters)', desc:'Display values formatted for the user’s locale & language.', items:[
        ['Formatted Address','lightning-formatted-address','built','Locale-formatted postal address with an optional map link.','FormattedAddress'],
        ['Formatted Date Time','lightning-formatted-date-time','built','Locale date/time with configurable parts (date, short, time, full).','FormattedDateTime'],
        ['Formatted Email','lightning-formatted-email','built','mailto: link from an email value.','FormattedEmail'],
        ['Formatted Location','lightning-formatted-location','built','Latitude/longitude formatting (decimal & DMS).','FormattedLocation'],
        ['Formatted Name','lightning-formatted-name','built','Locale-aware person name ordering (long, medium, short).','FormattedName'],
        ['Formatted Number','lightning-formatted-number','built','Number / currency / percent / compact for the locale.','FormattedNumber'],
        ['Formatted Phone','lightning-formatted-phone','built','tel: link with formatted phone number.','FormattedPhone'],
        ['Formatted Rich Text','lightning-formatted-rich-text','built','Renders sanitized rich-text HTML.','FormattedRichText'],
        ['Formatted Text','lightning-formatted-text','built','Plain text with auto-linked URLs/emails.','FormattedText'],
        ['Formatted Time','lightning-formatted-time','built','Locale time-of-day formatting.','FormattedTime'],
        ['Formatted URL','lightning-formatted-url','built','Anchor link from a URL value.','FormattedURL'],
        ['Relative Date Time','lightning-relative-date-time','built','“2 hours ago” style relative time, computed live from now.','RelativeDateTime'],
      ]},
      { id:'progress', title:'Progress', desc:'Components that convey the progress of a process.', items:[
        ['Progress Bar','lightning-progress-bar','built','A horizontal completion indicator (0–100).','ProgressBar'],
        ['Progress Indicator','lightning-progress-indicator','built','Sales/case Path (chevrons) or guided-flow stepper (incl. Progress Step).','ProgressIndicator'],
        ['Progress Ring','lightning-progress-ring','built','A compact circular completion indicator.','ProgressRing'],
        ['Spinner','lightning-spinner','built','An animated loading indicator in four sizes.','Spinner'],
      ]},
      { id:'tables', title:'Tables & Trees', desc:'Display large amounts of record data; trees show expandable hierarchy.', items:[
        ['Datatable','lightning-datatable','built','A record grid with selection, sortable columns, custom cells & row actions.','Datatable'],
        ['Tree','lightning-tree','built','A nested, expand/collapse hierarchy.','Tree'],
        ['Tree Grid','lightning-tree-grid','built','A datatable with expandable nested rows — chevron toggle, row selection, and typed cells (link, phone, currency).','TreeGrid'],
        ['Dynamic List Container','lightning-dynamic-list-container','built','A virtualized list (dev preview) — renders only visible rows for huge datasets. Scroll 1,000 rows live.','DynamicListContainer'],
        ['Dynamic List Item','lightning-dynamic-list-item','built','The row wrapper inside a Dynamic List Container — each item-id row, positioned by the container during virtualization.','DynamicListContainer'],
      ]},
      { id:'mobile', title:'Mobile', desc:'Components for use in the Salesforce Mobile App — access on-device hardware.', items:[
        ['Barcode Scanner','lightning-barcode-scanner','built','Scans barcodes via the device camera. Single & continuous modes, icon sizes, enabled/disabled & custom icon.','BarcodeScanner'],
      ]},
      { id:'omnistudio', title:'OmniStudio', desc:'OmniStudio data-display & guided-interaction components.', items:[
        ['FlexCard','omnistudio-flexcard','built','A data card — header, field grid, status badge & action buttons.','FlexCard'],
        ['OmniScript','omnistudio-omniscript','built','A guided multi-step interaction (wizard) — path indicator, step forms & Previous/Next nav.','OmniScript'],
        ['PubSub','omnistudio-pubsub','built','Publish/subscribe messaging between components — publishers emit, subscribers react.','PubSub'],
      ]},
    ];

    const slug = s => 'c-'+String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');

    function Entry({ row }) {
      const [name, tag, status, desc, exKey] = row;
      const wide = exKey && WIDE.has(exKey);
      let demo;
      if (status === 'built' && exKey && Ex[exKey]) {
        const Comp = Ex[exKey];
        demo = <div className="demo block"><Comp /></div>;
      } else {
        demo = <div className="demo empty">Documented — see description.</div>;
      }
      return (
        <div className={`entry ${wide?'wide':''}`} id={slug(name)} style={{scrollMarginTop:'1rem'}}>
          <header>
            <div className="nm">
              <span className={`dot ${status}`}></span>
              <strong>{name}</strong>
              <code>{tag}</code>
              <span style={{flex:1}}></span>
              <span className={`pill ${status}`}>{status === 'built' ? 'In this kit' : 'Documented'}</span>
            </div>
            <p className="desc">{desc}</p>
          </header>
          {demo}
        </div>
      );
    }

    function App() {
      const builtAll = CAT.reduce((s,c)=>s+c.items.filter(i=>i[2]==='built').length,0);
      const totalAll = CAT.reduce((s,c)=>s+c.items.length,0);
      const allItems = React.useMemo(()=>CAT.flatMap(c=>c.items.map(i=>({name:i[0],tag:i[1],status:i[2]}))).sort((a,b)=>a.name.localeCompare(b.name)),[]);
      const [q,setQ]=React.useState('');
      const searchRef=React.useRef(null);
      React.useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='j'){e.preventDefault();searchRef.current&&searchRef.current.focus();}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
      const ql=q.trim().toLowerCase();
      const matches=ql?allItems.filter(i=>i.name.toLowerCase().includes(ql)||i.tag.toLowerCase().includes(ql)):allItems;
      return (
        <>
          <aside className="side">
            <div className="side-head">
              <div className="eyebrow"><span className="material-symbols-rounded" style={{fontSize:18}}>arrow_back</span><span className="material-symbols-rounded bolt">bolt</span><span>Platform</span></div>
              <h1>Lightning Component Reference</h1>
              <div className="search">
                <span className="material-symbols-rounded" style={{fontSize:18,color:'var(--slds-g-color-on-surface-3)'}}>search</span>
                <input ref={searchRef} value={q} onChange={e=>setQ(e.target.value)} placeholder="Search" aria-label="Search components" />
                <span className="kbd">⌘J</span>
              </div>
            </div>
            <nav className="navlist">
              {matches.length ? matches.map(i => (
                <a key={i.name} href={`#${slug(i.name)}`}>
                  <span className={`sdot ${i.status}`}></span>
                  <span>{i.name}</span>
                </a>
              )) : <div className="empty-nav">No components match “{q}”.</div>}
            </nav>
          </aside>
          <main className="main">
            <div className="lede">
              <h2>LWC Component Reference</h2>
              <p>Every Salesforce Lightning base component, organized by the official functional categories. Components built in this kit render live below; the rest are documented with how to compose them from the primitives.</p>
              <div className="legend">
                <span className="lg-item"><span className="dot built"></span> Built in this kit — live, token-driven SLDS 2 component ({builtAll}/{totalAll})</span>
                <span className="lg-item"><span className="dot doc"></span> Documented — data-bound or locale formatter; compose / integrate</span>
              </div>
            </div>
            {CAT.map(c => (
              <section key={c.id} id={c.id} className="cat">
                <h3>{c.title}</h3>
                <p className="catdesc">{c.desc}</p>
                <div className="grid">
                  {c.items.map((row,i) => <Entry key={i} row={row} />)}
                </div>
              </section>
            ))}
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
